<script type="text/babel" data-type="module">
      import React, { useState, useEffect, useRef, useCallback, useMemo, useContext, Fragment } from "react";
      import ReactDOMClient from "react-dom/client";
      import { useFireproof, useFireproofClerk } from "use-fireproof";

      // Always export useFireproofClerk so app code works in both local-only and deployed modes
      window.useFireproofClerk = useFireproofClerk;

      // __VIBES_APP_CODE__

      // Use shared error components from base template
      const ConfigError = window.ConfigError;
      const LoadingError = window.LoadingError;

      // App wrapper — full OIDC auth when Connect is configured, local-only otherwise
      function AppWrapper() {
        const config = window.__VIBES_CONFIG__;

        // Hook must be called unconditionally at top of component (Rules of Hooks)
        window.useVibesPanelEvents('Vibes');

        const hasConnect = !!(config?.tokenApiUri && config?.cloudBackendUrl &&
          !config.tokenApiUri.startsWith('__') && !config.cloudBackendUrl.startsWith('__'));
        const hasOidc = !!(config?.oidcAuthority && !config.oidcAuthority.startsWith('__') &&
          config?.oidcClientId && !config.oidcClientId.startsWith('__'));

        // No Connect URLs — run local-only (no auth, no sync)
        if (!hasConnect) {
          if (!hasOidc) {
            console.info('[vibes] No credentials configured — running local-only.');
          } else {
            console.info('[vibes] Sync will be configured on first deploy. Running local-only preview.');
          }
          return (
            <HiddenMenuWrapper menuContent={<VibesPanel />}>
              <App />
            </HiddenMenuWrapper>
          );
        }

        // Full mode — Connect configured, OIDC required
        if (!hasOidc) {
          return <ConfigError message="Missing OIDC configuration. Apps require authentication." />;
        }

        // Check if OIDC bridge loaded
        if (!window.OIDCProvider) {
          return <LoadingError error={window.__OIDC_LOAD_ERROR__ || 'OIDC components not available'} />;
        }

        const { OIDCProvider, SignedIn, SignedOut, SignInButton } = window.OIDCComponents;

        // Use shared components from window
        const AuthScreen = window.AuthScreen;
        const VibesButton = window.VibesButton;
        const RED = window.RED;

        // AuthGate shown when user is not signed in
        const isJoined = window.__VIBES_JOINED__;
        const AuthGate = () => {
          React.useEffect(() => {
            const handler = () => {
              if (document.visibilityState === 'visible' && sessionStorage.getItem('vibes-signup-pending')) {
                sessionStorage.removeItem('vibes-signup-pending');
                const btn = document.querySelector('[data-vibes-signin]');
                if (btn) btn.click();
              }
            };
            document.addEventListener('visibilitychange', handler);
            return () => document.removeEventListener('visibilitychange', handler);
          }, []);

          return (
            <AuthScreen
              title={isJoined ? "Welcome! You've been invited to collaborate." : "Sign in to continue"}
              message={isJoined ? "Sign in to get started." : "This app uses cloud sync and requires authentication."}
              showCard={true}
            >
              <SignInButton>
                <VibesButton data-vibes-signin variant={RED} buttonType="form">
                  Sign In
                </VibesButton>
              </SignInButton>
            </AuthScreen>
          );
        };

        return (
          <>
            <SyncStatusDot />
            <OIDCProvider
              authority={config.oidcAuthority}
              clientId={config.oidcClientId}
              config={{
                apiUrl: config.tokenApiUri,
                cloudUrl: config.cloudBackendUrl
              }}
            >
              <SignedOut>
                <AuthGate />
              </SignedOut>
              <SignedIn>
                <SharingBridge />
                <HiddenMenuWrapper menuContent={<VibesPanel />}>
                  <App />
                </HiddenMenuWrapper>
              </SignedIn>
            </OIDCProvider>
          </>
        );
      }

      // Load OIDC bridge components when Connect is configured, otherwise local-only
      async function initApp() {
        const config = window.__VIBES_CONFIG__;
        const hasConnect = !!(config?.tokenApiUri && config?.cloudBackendUrl &&
          !config.tokenApiUri.startsWith('__') && !config.cloudBackendUrl.startsWith('__'));

        if (hasConnect) {
          try {
            // Dynamic import of OIDC bridge (mapped via import map to fireproof-oidc-bridge.js)
            const oidcModule = await import("use-fireproof");
            window.OIDCProvider = oidcModule.OIDCProvider;
            window.OIDCComponents = {
              OIDCProvider: oidcModule.OIDCProvider,
              SignedIn: oidcModule.SignedIn,
              SignedOut: oidcModule.SignedOut,
              SignInButton: oidcModule.SignInButton,
              UserButton: oidcModule.UserButton
            };
            // Export for user's App code
            window.SignedIn = oidcModule.SignedIn;
            window.SignedOut = oidcModule.SignedOut;
            window.SignInButton = oidcModule.SignInButton;
            window.UserButton = oidcModule.UserButton;
            window.useUser = oidcModule.useUser;
            // Export OIDC context for SharingBridge and user code
            window.useOIDCContext = oidcModule.useOIDCContext;
          } catch (err) {
            console.error('Failed to load OIDC components:', err);
            window.__OIDC_LOAD_ERROR__ = err.message || String(err);
          }
        }

        const rootElement = document.getElementById("container");
        ReactDOMClient.createRoot(rootElement).render(<AppWrapper />);
      }

      initApp();
    </script>
