<script type="text/babel" data-type="module">
      import ReactDOMClient from "react-dom/client";
      import { useFireproofClerk } from "use-fireproof";

      // __VIBES_APP_CODE__

      // Use shared error components from base template
      const ConfigError = window.ConfigError;
      const LoadingError = window.LoadingError;

      // App wrapper with OIDC auth gate (always required)
      function AppWrapper() {
        const config = window.__VIBES_CONFIG__;

        // Hook must be called unconditionally at top of component (Rules of Hooks)
        window.useVibesPanelEvents('Vibes');

        // Check for configuration errors
        if (!config?.oidcAuthority || config.oidcAuthority.startsWith('__') ||
            !config?.oidcClientId || config.oidcClientId.startsWith('__')) {
          return <ConfigError message="Missing OIDC configuration. Apps require authentication." />;
        }

        // Warn if Connect URLs are unreplaced placeholders (assembly bug)
        // Empty URLs are expected pre-deploy — sync configures on first deploy via alchemy
        if (config?.tokenApiUri?.startsWith('__') || config?.cloudBackendUrl?.startsWith('__')) {
          console.warn('[vibes] Connect URL placeholders not replaced — check assembly.',
            'tokenApiUri:', config?.tokenApiUri, 'cloudBackendUrl:', config?.cloudBackendUrl);
        } else if (!config?.tokenApiUri || !config?.cloudBackendUrl) {
          console.info('[vibes] Sync will be configured on first deploy.');
        }

        // Check if OIDC bridge loaded
        if (!window.OIDCProvider) {
          return <LoadingError error={window.__OIDC_LOAD_ERROR__ || 'OIDC components not available'} />;
        }

        const { OIDCProvider, SignedIn, SignedOut, SignInButton } = window.OIDCComponents;

        // Use shared components from window
        const AuthScreen = window.AuthScreen;
        const VibesButton = window.VibesButton;
        const RED = window.RED;

        // AuthGate shown when user is not signed in
        const AuthGate = () => (
          <AuthScreen
            title="Sign in to continue"
            message="This app uses cloud sync and requires authentication."
            showCard={true}
          >
            <SignInButton>
              <VibesButton variant={RED} buttonType="form">
                Sign In
              </VibesButton>
            </SignInButton>
          </AuthScreen>
        );

        return (
          <>
            <SyncStatusDot />
            <OIDCProvider
              authority={config.oidcAuthority}
              clientId={config.oidcClientId}
              config={{
                apiUrl: config.tokenApiUri,
                cloudUrl: config.cloudBackendUrl
              }}
            >
              <SignedOut>
                <AuthGate />
              </SignedOut>
              <SignedIn>
                <SharingBridge />
                <HiddenMenuWrapper menuContent={<VibesPanel />}>
                  <App />
                </HiddenMenuWrapper>
              </SignedIn>
            </OIDCProvider>
          </>
        );
      }

      // Load OIDC bridge components (required for all apps)
      async function initApp() {
        try {
          // Dynamic import of OIDC bridge (mapped via import map to fireproof-oidc-bridge.js)
          const oidcModule = await import("use-fireproof");
          window.OIDCProvider = oidcModule.OIDCProvider;
          window.OIDCComponents = {
            OIDCProvider: oidcModule.OIDCProvider,
            SignedIn: oidcModule.SignedIn,
            SignedOut: oidcModule.SignedOut,
            SignInButton: oidcModule.SignInButton,
            UserButton: oidcModule.UserButton
          };
          // Export for user's App code
          window.SignedIn = oidcModule.SignedIn;
          window.SignedOut = oidcModule.SignedOut;
          window.SignInButton = oidcModule.SignInButton;
          window.UserButton = oidcModule.UserButton;
          window.useUser = oidcModule.useUser;
          // Export OIDC context for SharingBridge and user code
          window.useOIDCContext = oidcModule.useOIDCContext;

          // Export Fireproof hook for user's App code (bridge provides ledger routing + invite)
          window.useFireproofClerk = oidcModule.useFireproofClerk;
        } catch (err) {
          console.error('Failed to load OIDC components:', err);
          window.__OIDC_LOAD_ERROR__ = err.message || String(err);
        }

        const rootElement = document.getElementById("container");
        ReactDOMClient.createRoot(rootElement).render(<AppWrapper />);
      }

      initApp();
    </script>
