<script type="text/babel" data-type="module">
  import React, { useState, useEffect, useRef, useCallback, useMemo, useContext, createContext, Fragment } from "react";
  import ReactDOMClient from "react-dom/client";
  import { createMergeableStore } from "tinybase/mergeable-store";
  import { createLocalPersister } from "tinybase/persisters/persister-browser";
  import { createWsSynchronizer } from "tinybase/synchronizers/synchronizer-ws-client";
  import { Provider, useTable, useRow, useCell, useValue, useValues, useRowIds, useSortedRowIds, useRowCount, useHasRow, useHasCell, useHasValue, useCellIds, useTableIds, useAddRowCallback, useSetCellCallback, useSetRowCallback, useSetPartialRowCallback, useDelRowCallback, useDelCellCallback, useDelTableCallback, useSetValueCallback, useDelValueCallback, useCellState, useRowState, useValueState } from "tinybase/ui-react";

  // Expose TinyBase hooks as globals for generated app code
  // useTable warning wrapper — alerts when table has >100 rows
  const _rawUseTable = useTable;
  const _warnedTables = new Set();
  window.useTable = function useTableWithWarning(tableId) {
    const table = _rawUseTable(tableId);
    if (typeof table === 'object' && table !== null) {
      const rowCount = Object.keys(table).length;
      if (rowCount > 100 && !_warnedTables.has(tableId)) {
        _warnedTables.add(tableId);
        console.warn(
          `[vibes] useTable('${tableId}') returned ${rowCount} rows. ` +
          `For better performance, use useRowIds('${tableId}') + useCell() in child components.`
        );
      }
    }
    return table;
  };
  window.useRow = useRow;
  window.useCell = useCell;
  window.useValue = useValue;
  window.useValues = useValues;
  window.useRowIds = useRowIds;
  window.useSortedRowIds = useSortedRowIds;
  window.useRowCount = useRowCount;
  window.useHasRow = useHasRow;
  window.useHasCell = useHasCell;
  window.useHasValue = useHasValue;
  window.useCellIds = useCellIds;
  window.useTableIds = useTableIds;
  window.useAddRowCallback = useAddRowCallback;
  window.useSetCellCallback = useSetCellCallback;
  window.useSetRowCallback = useSetRowCallback;
  window.useSetPartialRowCallback = useSetPartialRowCallback;
  window.useDelRowCallback = useDelRowCallback;
  window.useDelCellCallback = useDelCellCallback;
  window.useDelTableCallback = useDelTableCallback;
  window.useSetValueCallback = useSetValueCallback;
  window.useDelValueCallback = useDelValueCallback;
  // Convenience state hooks — familiar [value, setValue] pattern
  window.useCellState = useCellState;
  window.useRowState = useRowState;
  window.useValueState = useValueState;

  // --- App Context ---
  const AppContext = createContext(null);
  function useApp() { return useContext(AppContext); }
  window.useApp = useApp;

  // --- Reconnecting WebSocket Synchronizer ---
  function createReconnectingSynchronizer(store, wsUrl, onStatusChange) {
    let synchronizer = null;
    let backoff = 1000;
    let destroyed = false;
    let reconnectTimer = null;

    function scheduleReconnect() {
      if (destroyed || reconnectTimer) return;
      reconnectTimer = setTimeout(() => {
        reconnectTimer = null;
        connect();
      }, Math.min(backoff *= 2, 30000));
    }

    let connecting = false;

    async function connect() {
      if (destroyed || connecting) return;
      connecting = true;
      try {
        // Destroy previous synchronizer if it exists
        if (synchronizer) {
          try { synchronizer.destroy(); } catch {}
          synchronizer = null;
        }
        const ws = new WebSocket(wsUrl);
        synchronizer = await createWsSynchronizer(store, ws);
        await synchronizer.startSync();
        backoff = 1000;
        onStatusChange(true);
        ws.addEventListener('error', () => {});
        ws.addEventListener('close', () => {
          onStatusChange(false);
          scheduleReconnect();
        });
      } catch {
        scheduleReconnect();
      } finally {
        connecting = false;
      }
    }

    connect();
    return () => {
      destroyed = true;
      clearTimeout(reconnectTimer);
      synchronizer?.destroy();
    };
  }

  // __VIBES_APP_CODE__

  // --- App Shell ---
  const config = window.__APP_CONFIG__;
  // Create MergeableStore with unique client ID
  let clientId = localStorage.getItem('tinybase_client_id');
  if (!clientId) {
    clientId = crypto.randomUUID();
    localStorage.setItem('tinybase_client_id', clientId);
  }
  const store = createMergeableStore(clientId);

  // Use shared error components from base template
  const ConfigError = window.ConfigError;
  const LoadingError = window.LoadingError;

  // --- Error Boundary ---
  class AppErrorBoundary extends React.Component {
    constructor(props) {
      super(props);
      this.state = { error: null, componentStack: null };
    }
    static getDerivedStateFromError(error) {
      return { error };
    }
    componentDidCatch(error, info) {
      console.error('[vibes] App error:', error, info);
      this.setState({ componentStack: info?.componentStack || null });
    }
    render() {
      if (!this.state.error) return this.props.children;

      const error = this.state.error;
      const appName = window.__APP_CONFIG__?.appName || 'unknown';
      const errorMsg = error.message || String(error);
      const stack = (error.stack || '').split('\n').slice(0, 5).join('\n');
      const cStack = (this.state.componentStack || '').split('\n').filter(Boolean).slice(0, 3).join('\n');
      const allConsoleLogs = (window.__VIBES_CONSOLE_LOG__ || []).slice(-10);
      const allConsoleText = allConsoleLogs.map(e => `[${e.level}] ${e.message}`).join('\n');
      // Deep link uses last 5 (URL length constraint); details section shows last 10
      const linkConsoleText = allConsoleLogs.slice(-5).map(e => `[${e.level}] ${e.message}`).join('\n');

      const fixPayload = {
        app: appName,
        error: errorMsg,
        stack: stack,
        componentStack: cStack,
        console: linkConsoleText,
      };

      const deepLink = () => {
        // Inside editor preview iframe: send payload to parent editor frame
        if (window.parent !== window) {
          window.parent.postMessage({ type: 'vibes-fix-error', payload: fixPayload }, window.location.origin);
          return;
        }
        // Standalone deployed app: use vibes:// URL scheme to open desktop app
        const params = new URLSearchParams(fixPayload);
        window.location.href = 'vibes://fix?' + params.toString();
      };

      const copyToClipboard = () => {
        const text = [
          'My app crashed with this error:',
          '',
          'Error: ' + errorMsg,
          '',
          cStack ? 'Component: ' + cStack : '',
          '',
          allConsoleText ? 'Recent console:\n' + allConsoleText : '',
          '',
          'Please fix this.',
        ].filter(Boolean).join('\n');
        navigator.clipboard.writeText(text).then(() => {
          const btn = document.querySelector('[data-copy-error]');
          if (btn) { btn.textContent = 'Copied!'; setTimeout(() => { btn.textContent = 'or copy error to clipboard'; }, 2000); }
        });
      };

      const wrapperStyle = {
        minHeight: '100vh',
        backgroundColor: 'var(--color-background, #f5f5f4)',
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
        padding: '2rem',
      };
      const cardStyle = {
        background: 'var(--comp-bg, #fafafa)',
        border: '2px solid var(--comp-border, #1a1a1a)',
        borderRadius: '12px',
        maxWidth: '560px',
        width: '100%',
        overflow: 'hidden',
      };
      const titleStyle = {
        fontSize: 'clamp(2rem, 5vw, 3.5rem)',
        fontWeight: 800,
        color: 'var(--comp-text, #1a1a1a)',
        textAlign: 'center',
        padding: '1.5rem 1.5rem 0',
        marginBottom: '0.25rem',
      };
      const subtitleStyle = {
        fontSize: '0.95rem',
        color: 'var(--comp-text, #555)',
        textAlign: 'center',
        marginBottom: '1rem',
      };
      const msgStyle = {
        fontSize: '0.8rem',
        color: 'var(--comp-text, #555)',
        fontFamily: "ui-monospace, 'SF Mono', Monaco, 'Cascadia Code', monospace",
        background: 'rgba(128,128,128,0.1)',
        padding: '0.4rem 0.75rem',
        borderRadius: '6px',
        border: '1px solid rgba(128,128,128,0.15)',
        lineHeight: 1.4,
        margin: '0 1.5rem 1.25rem',
      };
      const actionsStyle = {
        padding: '0 1.5rem 1.5rem',
        display: 'flex',
        flexDirection: 'column',
        gap: '0.75rem',
        alignItems: 'center',
      };
      const btnBase = {
        width: '100%',
        padding: '0.65rem 0.9rem',
        background: 'var(--comp-bg, #fafafa)',
        color: 'var(--comp-text, #1a1a1a)',
        border: '2px solid var(--comp-border, #1a1a1a)',
        borderRadius: '12px',
        fontSize: '0.8125rem',
        lineHeight: 1.5,
        fontWeight: 600,
        cursor: 'pointer',
        fontFamily: 'inherit',
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
        gap: '0.5rem',
        transition: '0.2s',
      };
      const primaryShadow = { boxShadow: '4px 4px 0px 0px var(--comp-accent, #4a90d9)', background: 'var(--comp-accent, #4a90d9)', color: 'var(--comp-accent-text, #fff)' };
      const secondaryShadow = { boxShadow: '4px 4px 0px 0px var(--comp-border, #1a1a1a)' };

      const wrenchSvg = React.createElement('svg', { viewBox: '0 0 24 24', style: { width: 16, height: 16, fill: 'currentColor' } },
        React.createElement('path', { d: 'M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z' })
      );

      return (
        <div style={wrapperStyle}>
          <div style={cardStyle}>
            <div style={titleStyle}>Something went wrong</div>
            <div style={subtitleStyle}>Don't worry, we can fix it.</div>
            <div style={msgStyle}>{errorMsg}</div>
            <div style={actionsStyle}>
              <button onClick={deepLink} style={{ ...btnBase, ...primaryShadow }}>
                {wrenchSvg} Fix in VibesOS
              </button>
              <button onClick={() => this.setState({ error: null, componentStack: null })} style={{ ...btnBase, ...secondaryShadow }}>
                Try Again
              </button>
              <button data-copy-error onClick={copyToClipboard} style={{
                fontSize: '0.8rem', color: 'var(--comp-text, #555)', cursor: 'pointer',
                textDecoration: 'underline', textUnderlineOffset: '2px',
                background: 'none', border: 'none', fontFamily: 'inherit',
              }}>
                or copy error to clipboard
              </button>
            </div>
            <details style={{ borderTop: '1px solid rgba(0,0,0,0.1)', margin: 0 }}>
              <summary style={{ padding: '0.75rem 1.5rem', fontSize: '0.75rem', color: 'var(--comp-text, #999)', cursor: 'pointer', userSelect: 'none' }}>
                Technical details
              </summary>
              <pre style={{
                margin: 0, padding: '0.75rem 1.5rem 1rem', fontSize: '0.7rem',
                fontFamily: "ui-monospace, 'SF Mono', Monaco, 'Cascadia Code', monospace",
                lineHeight: 1.4, color: 'var(--comp-text, #666)', background: 'rgba(128,128,128,0.05)',
                overflowX: 'auto', whiteSpace: 'pre-wrap', wordBreak: 'break-all',
                borderBottomLeftRadius: '10px', borderBottomRightRadius: '10px',
              }}>
                {stack}
                {allConsoleLogs.length > 0 && (
                  <>
                    {'\n\n'}
                    <span style={{ fontWeight: 600, color: 'var(--comp-text, #999)', fontFamily: 'inherit', fontSize: '0.7rem' }}>Recent console:</span>
                    {'\n' + allConsoleText}
                  </>
                )}
              </pre>
            </details>
          </div>
        </div>
      );
    }
  }

  function AppShell() {
    const [isReady, setIsReady] = useState(false);
    const [isSyncing, setIsSyncing] = useState(false);

    window.useVibesPanelEvents('Vibes');

    useEffect(() => {
      let destroySync = null;
      let persister = null;

      async function init() {
        persister = createLocalPersister(store, `tinybase_${config.appName}`);
        await persister.startAutoPersisting([{}, {}]);
        setIsReady(true);

        if (config.wsUrl && !config.wsUrl.startsWith('__')) {
          destroySync = createReconnectingSynchronizer(
            store,
            config.wsUrl,
            (syncing) => {
              setIsSyncing(syncing);
              window.__VIBES_SYNC_STATUS__ = syncing ? 'synced' : 'reconnecting';
              window.dispatchEvent(new Event('vibes-sync-status-change'));
            },
          );
        }
      }

      init();
      return () => {
        if (destroySync) destroySync();
        if (persister) persister.destroy();
      };
    }, []);

    if (!isReady) {
      return (
        <div style={{ padding: '2rem', textAlign: 'center', opacity: 0.5, fontFamily: 'system-ui' }}>
          Loading...
        </div>
      );
    }

    return (
      <Provider store={store}>
        <SyncStatusDot />
        <AppContext.Provider value={{ isReady, isSyncing, user: null }}>
          <HiddenMenuWrapper menuContent={<VibesPanel />}>
            <AppErrorBoundary><App /></AppErrorBoundary>
          </HiddenMenuWrapper>
        </AppContext.Provider>
      </Provider>
    );
  }

  // Provide safe stubs for auth hooks so generated code
  // that calls useUser() doesn't crash in public apps.
  if (!window.useUser) {
    window.useUser = () => ({ email: null, name: null, sub: null });
  }
  if (!window.useOIDCContext) {
    window.useOIDCContext = () => ({ user: null, isAuthenticated: false });
  }

  // <!-- AUTH:INJECT -->

  // Public app — render directly
  if (window.__vibesPrivateInit) {
    window.__vibesPrivateInit();
  } else {
    const rootElement = document.getElementById("container");
    ReactDOMClient.createRoot(rootElement).render(<AppShell />);
  }
</script>
