<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibes Editor</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --vibes-black: #0f172a;
      --vibes-near-black: #1a1a1a;
      --vibes-cream: #fffff0;
      --vibes-menu-bg: #CCCDC8;
      --vibes-blue: #009ACE;
      --vibes-red: #DA291C;
      --vibes-yellow: #eab308;
      --vibes-green: #22c55e;
      --vibes-white: #fff;
      --grid-size: 32px;
      --grid-color: rgba(255, 255, 255, 0.5);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: black;
      color: var(--vibes-near-black);
      height: 100vh;
      overflow: hidden;
      margin: 0;
    }
    .black-border-wrapper {
      position: fixed;
      inset: 0;
      background: black;
    }
    .black-border-inner {
      height: calc(100% - 20px);
      width: calc(100% - 20px);
      margin: 10px;
      border-radius: 10px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: var(--vibes-menu-bg);
    }

    /* === HEADER === */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0;
      background: var(--vibes-cream);
      border-bottom: 1px solid black;
      height: 64px;
      flex-shrink: 0;
      font-family: 'Alte Haas Grotesk', 'Inter', sans-serif;
      box-shadow: 0px 1px 0px 0px var(--vibes-cream);
      border-top-left-radius: 10px;
      border-top-right-radius: 10px;
    }
    .header-left { display: flex; align-items: center; height: 100%; }
    .header-right { display: flex; align-items: center; height: 100%; }
    .vibes-pill-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 63px;
    }
    .vibes-pill { height: 36px; cursor: pointer; padding: 0 12px; }

    /* Navbar expand-on-hover buttons */
    .navbar-button-wrapper {
      display: flex;
      align-items: center;
      height: 63px;
    }
    .navbar-button-wrapper button {
      display: flex;
      align-items: center;
      height: 63px;
      width: 64px;
      justify-content: center;
      border: none;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      overflow: hidden;
      padding: 0;
      position: relative;
      font-family: 'Alte Haas Grotesk', 'Inter', sans-serif;
    }
    .navbar-button-icon {
      width: 64px;
      height: 63px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 22px;
    }
    .navbar-button-label {
      color: var(--vibes-cream);
      font-size: 14px;
      font-weight: bold;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      opacity: 0;
      width: 0;
      padding: 0;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      overflow: hidden;
      display: inline-block;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
      flex-shrink: 0;
    }
    .navbar-button-wrapper:hover button {
      width: 180px !important;
      justify-content: flex-start !important;
    }
    .navbar-button-wrapper:hover .navbar-button-label {
      opacity: 1 !important;
      width: auto !important;
      max-width: 120px !important;
      padding: 0 16px 0 4px !important;
    }
    .navbar-button-wrapper:hover .navbar-button-icon {
      animation: wiggle 0.6s ease-in-out infinite;
    }
    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-5deg); }
      75% { transform: rotate(5deg); }
    }

    /* === PHASES === */
    .phase { display: none; flex: 1; overflow: hidden; }
    .phase.active { display: flex; }

    /* === PHASE 1: SETUP === */
    .setup-phase {
      align-items: center;
      justify-content: center;
      background: var(--vibes-menu-bg);
      background-image:
        linear-gradient(var(--grid-color) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
      background-size: var(--grid-size) var(--grid-size);
    }
    .setup-card {
      background: var(--vibes-cream);
      border: 3px solid var(--vibes-near-black);
      border-radius: 12px;
      padding: 2rem;
      width: 480px;
      max-width: 90vw;
      box-shadow: 8px 10px 0px 0px var(--vibes-blue), 8px 10px 0px 3px var(--vibes-near-black);
    }
    .setup-title {
      font-size: 1.25rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .setup-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid rgba(0,0,0,0.1);
    }
    .setup-item:last-of-type { border-bottom: none; }
    .setup-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 800;
      flex-shrink: 0;
    }
    .setup-icon.pass { background: var(--vibes-green); color: white; }
    .setup-icon.fail { background: var(--vibes-red); color: white; }
    .setup-icon.checking { background: var(--vibes-yellow); color: var(--vibes-near-black); }
    .setup-icon.optional { background: #999; color: white; }
    .setup-label {
      flex: 1;
      font-size: 0.875rem;
      font-weight: 600;
    }
    .setup-detail {
      font-size: 0.75rem;
      color: #555;
    }
    .setup-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.5rem;
      justify-content: flex-end;
    }
    .btn {
      background: var(--vibes-cream);
      border: 2px solid var(--vibes-near-black);
      color: var(--vibes-near-black);
      padding: 0.5rem 1.25rem;
      border-radius: 12px;
      font-size: 0.875rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s ease;
      letter-spacing: 0.05em;
      font-family: inherit;
    }
    .btn-primary {
      box-shadow: 4px 4px 0px 0px var(--vibes-blue), 4px 4px 0px 2px var(--vibes-near-black);
    }
    .btn-primary:hover { transform: translate(2px, 2px); box-shadow: 2px 2px 0px 0px var(--vibes-blue), 2px 2px 0px 2px var(--vibes-near-black); }
    .btn-primary:active { transform: translate(4px, 4px); box-shadow: none; }
    .btn-secondary {
      box-shadow: 3px 3px 0px 0px var(--vibes-yellow), 3px 3px 0px 2px var(--vibes-near-black);
    }
    .btn-secondary:hover { transform: translate(2px, 2px); box-shadow: 1px 1px 0px 0px var(--vibes-yellow), 1px 1px 0px 2px var(--vibes-near-black); }
    .btn-deploy {
      box-shadow: 4px 4px 0px 0px var(--vibes-green), 4px 4px 0px 2px var(--vibes-near-black);
    }
    .btn-deploy:hover { transform: translate(2px, 2px); box-shadow: 2px 2px 0px 0px var(--vibes-green), 2px 2px 0px 2px var(--vibes-near-black); }
    .btn-deploy:active { transform: translate(4px, 4px); box-shadow: none; }
    .btn:disabled { background: #ddd; color: #999; cursor: not-allowed; box-shadow: none; transform: none; border-color: #aaa; }

    /* === PHASE 2: GENERATE === */
    .generate-phase {
      align-items: center;
      justify-content: center;
      background: var(--vibes-menu-bg);
      background-image:
        linear-gradient(var(--grid-color) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
      background-size: var(--grid-size) var(--grid-size);
    }
    .generate-card {
      background: var(--vibes-cream);
      border: 3px solid var(--vibes-near-black);
      border-radius: 12px;
      padding: 2rem;
      width: 560px;
      max-width: 90vw;
      box-shadow: 8px 10px 0px 0px var(--vibes-yellow), 8px 10px 0px 3px var(--vibes-near-black);
      overflow: hidden;
    }
    .generate-title {
      font-size: 1.25rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }
    .generate-subtitle {
      font-size: 0.8125rem;
      color: #555;
      margin-bottom: 1.5rem;
    }
    .generate-textarea {
      width: 100%;
      background: white;
      border: 2px solid var(--vibes-near-black);
      color: var(--vibes-near-black);
      padding: 0.75rem;
      border-radius: 12px;
      font-size: 0.875rem;
      outline: none;
      resize: none;
      font-family: inherit;
      min-height: 120px;
      margin-bottom: 1rem;
    }
    .generate-textarea:focus { border-color: var(--vibes-blue); box-shadow: 0 0 0 2px rgba(0,154,206,0.25); }
    .generate-textarea::placeholder { color: #999; }
    .theme-select-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }
    .theme-select-label {
      font-size: 0.8125rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .theme-select {
      flex: 1;
      min-width: 0;
      background: white;
      border: 2px solid var(--vibes-near-black);
      color: var(--vibes-near-black);
      padding: 0.5rem 0.75rem;
      border-radius: 10px;
      font-size: 0.8125rem;
      font-family: inherit;
      outline: none;
      cursor: pointer;
      max-width: 100%;
    }
    .theme-select:focus { border-color: var(--vibes-blue); }
    .generate-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
      align-items: center;
    }
    .generate-or {
      text-align: center;
      padding: 1rem 0;
      font-size: 0.75rem;
      color: #888;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .generate-existing {
      text-align: center;
    }

    /* Generate progress overlay */
    .generate-progress {
      display: none;
      flex-direction: column;
      gap: 0.75rem;
      padding: 1rem 0;
    }
    .generate-progress.active { display: flex; }

    /* === PHASE 3: EDIT === */
    .edit-phase { flex-direction: row; }

    /* Preview Panel */
    .preview-panel {
      flex: 0 0 72%;
      position: relative;
      background: #fff;
      overflow: hidden;
      border-right: 2px solid var(--vibes-near-black);
    }
    .preview-panel.thinking { opacity: 0.5; transition: opacity 0.3s; }
    .preview-panel.updated {
      animation: flash-border 0.6s ease-out;
    }
    @keyframes flash-border {
      0% { box-shadow: inset 0 0 0 3px var(--vibes-green); }
      100% { box-shadow: inset 0 0 0 0px transparent; }
    }
    .preview-iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Splitter */
    .splitter {
      width: 6px;
      background: var(--vibes-near-black);
      cursor: col-resize;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .splitter:hover, .splitter.dragging { background: var(--vibes-blue); }

    /* Chat Panel */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--vibes-menu-bg);
      background-image:
        linear-gradient(var(--grid-color) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
      background-size: var(--grid-size) var(--grid-size);
      min-width: 280px;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .chat-bubble {
      max-width: 85%;
      padding: 0.65rem 0.9rem;
      border-radius: 12px;
      font-size: 0.8125rem;
      line-height: 1.5;
      word-wrap: break-word;
      white-space: pre-wrap;
      border: 2px solid var(--vibes-near-black);
    }
    .chat-bubble.user {
      align-self: flex-end;
      background: var(--vibes-cream);
      color: var(--vibes-near-black);
      box-shadow: 4px 4px 0px 0px var(--vibes-blue), 4px 4px 0px 2px var(--vibes-near-black);
      border-bottom-right-radius: 4px;
    }
    .chat-bubble.assistant {
      align-self: flex-start;
      background: var(--vibes-cream);
      color: var(--vibes-near-black);
      box-shadow: 4px 4px 0px 0px var(--vibes-yellow), 4px 4px 0px 2px var(--vibes-near-black);
      border-bottom-left-radius: 4px;
    }
    .chat-bubble.error {
      align-self: center;
      background: var(--vibes-cream);
      color: var(--vibes-red);
      box-shadow: 4px 4px 0px 0px var(--vibes-red), 4px 4px 0px 2px var(--vibes-near-black);
      font-size: 0.75rem;
    }
    .chat-bubble.system {
      align-self: center;
      background: transparent;
      color: #555;
      font-size: 0.75rem;
      font-style: italic;
      border: none;
      box-shadow: none;
    }
    .chat-bubble.deploy-success {
      align-self: center;
      background: var(--vibes-cream);
      color: var(--vibes-green);
      box-shadow: 4px 4px 0px 0px var(--vibes-green), 4px 4px 0px 2px var(--vibes-near-black);
      font-weight: 700;
    }
    .chat-bubble.deploy-success a {
      color: var(--vibes-blue);
      text-decoration: underline;
    }
    .thinking-indicator {
      align-self: flex-start;
      width: 85%;
      padding: 0.65rem 0.9rem;
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: var(--vibes-cream);
      border: 2px solid var(--vibes-near-black);
      border-radius: 12px;
      box-shadow: 4px 4px 0px 0px var(--vibes-yellow), 4px 4px 0px 2px var(--vibes-near-black);
    }
    .thinking-header {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .thinking-dots {
      display: flex;
      gap: 4px;
    }
    .thinking-dot {
      width: 7px;
      height: 7px;
      background: var(--vibes-blue);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }
    .thinking-dot:nth-child(2) { animation-delay: 0.16s; }
    .thinking-dot:nth-child(3) { animation-delay: 0.32s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }
    .thinking-stage {
      font-size: 0.75rem;
      color: #555;
      font-weight: 600;
    }
    .thinking-progress-bar {
      width: 100%;
      height: 7px;
      background: rgba(0,0,0,0.1);
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid var(--vibes-near-black);
    }
    .thinking-progress-fill {
      height: 100%;
      background: var(--vibes-blue);
      border-radius: 4px;
      transition: width 0.5s ease;
      width: 0%;
    }
    .thinking-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .thinking-pct {
      font-size: 0.6875rem;
      color: #555;
      font-weight: 700;
    }
    .thinking-timer {
      font-size: 0.6875rem;
      color: #555;
      font-variant-numeric: tabular-nums;
    }
    .thinking-cancel {
      background: var(--vibes-cream);
      border: 2px solid var(--vibes-near-black);
      color: var(--vibes-red);
      padding: 0.25rem 0.6rem;
      border-radius: 8px;
      font-size: 0.6875rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 3px 3px 0px 0px var(--vibes-red), 3px 3px 0px 2px var(--vibes-near-black);
    }
    .thinking-cancel:hover { transform: translate(2px, 2px); box-shadow: 1px 1px 0px 0px var(--vibes-red), 1px 1px 0px 2px var(--vibes-near-black); }
    .thinking-cancel:active { transform: translate(3px, 3px); box-shadow: none; }

    /* Chat Input */
    .chat-input-bar {
      display: flex;
      padding: 0.75rem;
      gap: 0.5rem;
      border-top: 2px solid var(--vibes-near-black);
      background: var(--vibes-menu-bg);
    }
    .chat-input {
      flex: 1;
      background: var(--vibes-cream);
      border: 2px solid var(--vibes-near-black);
      color: var(--vibes-near-black);
      padding: 0.5rem 0.75rem;
      border-radius: 12px;
      font-size: 0.8125rem;
      outline: none;
      resize: none;
      font-family: inherit;
      min-height: 38px;
      max-height: 120px;
    }
    .chat-input:focus { border-color: var(--vibes-blue); box-shadow: 0 0 0 2px rgba(0,154,206,0.25); }
    .chat-input::placeholder { color: #999; }
    .chat-send {
      background: var(--vibes-cream);
      border: 2px solid var(--vibes-near-black);
      color: var(--vibes-near-black);
      padding: 0 1rem;
      border-radius: 12px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 700;
      transition: all 0.15s ease;
      flex-shrink: 0;
      letter-spacing: 0.05em;
      box-shadow: 4px 4px 0px 0px var(--vibes-blue), 4px 4px 0px 2px var(--vibes-near-black);
    }
    .chat-send:hover { transform: translate(2px, 2px); box-shadow: 2px 2px 0px 0px var(--vibes-blue), 2px 2px 0px 2px var(--vibes-near-black); }
    .chat-send:active { transform: translate(4px, 4px); box-shadow: none; }
    .chat-send:disabled { background: #ddd; color: #999; cursor: not-allowed; box-shadow: none; transform: none; border-color: #aaa; }

    /* === THEME MODAL === */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--vibes-cream);
      border: 3px solid var(--vibes-near-black);
      border-radius: 12px;
      width: 90vw;
      max-width: 800px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 8px 10px 0px 0px var(--vibes-blue), 8px 10px 0px 3px var(--vibes-near-black);
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      border-bottom: 2px solid var(--vibes-near-black);
    }
    .modal-header h2 {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--vibes-near-black);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .modal-close {
      background: var(--vibes-cream);
      border: 2px solid var(--vibes-near-black);
      color: var(--vibes-near-black);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0.15rem 0.5rem;
      line-height: 1;
      border-radius: 8px;
      box-shadow: 3px 3px 0px 0px var(--vibes-red), 3px 3px 0px 2px var(--vibes-near-black);
      transition: all 0.15s;
    }
    .modal-close:hover { transform: translate(2px, 2px); box-shadow: 1px 1px 0px 0px var(--vibes-red), 1px 1px 0px 2px var(--vibes-near-black); }
    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      background: var(--vibes-menu-bg);
      background-image:
        linear-gradient(var(--grid-color) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
      background-size: var(--grid-size) var(--grid-size);
    }
    .theme-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
    }
    .theme-card {
      background: var(--vibes-cream);
      border: 2px solid var(--vibes-near-black);
      border-radius: 8px;
      padding: 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 4px 4px 0px 0px var(--vibes-blue), 4px 4px 0px 2px var(--vibes-near-black);
    }
    .theme-card:hover {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px 0px var(--vibes-blue), 2px 2px 0px 2px var(--vibes-near-black);
    }
    .theme-card-name {
      font-size: 0.8125rem;
      font-weight: 700;
      color: var(--vibes-near-black);
      margin-bottom: 0.25rem;
    }
    .theme-card-mood {
      font-size: 0.6875rem;
      color: #555;
      margin-bottom: 0.35rem;
    }
    .theme-card-for {
      font-size: 0.625rem;
      color: var(--vibes-blue);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .theme-search {
      width: 100%;
      background: var(--vibes-cream);
      border: 2px solid var(--vibes-near-black);
      color: var(--vibes-near-black);
      padding: 0.6rem 0.85rem;
      border-radius: 12px;
      font-size: 0.8125rem;
      outline: none;
      font-family: inherit;
      margin-bottom: 1rem;
    }
    .theme-search:focus { border-color: var(--vibes-blue); box-shadow: 0 0 0 2px rgba(0,154,206,0.25); }
    .theme-search::placeholder { color: #999; }
    .theme-section-label {
      font-size: 0.6875rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--vibes-near-black);
      margin-bottom: 0.5rem;
    }
    .theme-section-label.all {
      color: #555;
      margin-top: 1rem;
    }
    .theme-card.recommended { border-color: var(--vibes-blue); }
    .theme-card-badge {
      display: inline-block;
      font-size: 0.5625rem;
      background: var(--vibes-blue);
      color: var(--vibes-cream);
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      margin-left: 0.35rem;
      vertical-align: middle;
      font-weight: 700;
      text-transform: uppercase;
    }
    .theme-swatches {
      display: flex;
      gap: 4px;
      margin-bottom: 0.4rem;
      align-items: center;
    }
    .theme-swatch-bar {
      flex: 1;
      height: 24px;
      border-radius: 4px;
      display: flex;
      overflow: hidden;
      border: 2px solid var(--vibes-near-black);
    }
    .theme-swatch-segment {
      flex: 1;
      min-width: 0;
    }

    /* === DEPLOY DROPDOWN === */
    .deploy-dropdown {
      position: relative;
      display: inline-block;
    }
    .deploy-menu {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 4px;
      background: var(--vibes-cream);
      border: 2px solid var(--vibes-near-black);
      border-radius: 8px;
      overflow: hidden;
      z-index: 100;
      min-width: 200px;
      box-shadow: 4px 4px 0px 0px var(--vibes-green), 4px 4px 0px 2px var(--vibes-near-black);
    }
    .deploy-menu.open { display: block; }
    .deploy-option {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1rem;
      cursor: pointer;
      font-size: 0.8125rem;
      font-weight: 600;
      transition: background 0.1s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: inherit;
    }
    .deploy-option:hover { background: rgba(0,154,206,0.1); }
    .deploy-option:not(:last-child) { border-bottom: 1px solid rgba(0,0,0,0.1); }
    .deploy-option:disabled { color: #999; cursor: not-allowed; }
    .deploy-option:disabled:hover { background: none; }
    .deploy-option-icon { font-size: 1rem; }
    .deploy-option-detail {
      font-size: 0.6875rem;
      color: #888;
      font-weight: 400;
    }
  </style>
</head>

  <!-- Phase 1: Setup -->
  <div class="phase setup-phase" id="phaseSetup">
    <div class="setup-card">
      <div class="setup-title">
        <span>&#9889;</span> Environment Check
      </div>
      <div id="setupChecklist">
        <div class="setup-item">
          <div class="setup-icon checking">...</div>
          <div>
            <div class="setup-label">Checking dependencies...</div>
          </div>
        </div>
      </div>
      <div class="setup-actions" id="setupActions" style="display:none;">
        <button class="btn btn-secondary" id="setupSkipBtn" onclick="skipSetup()" style="display:none;">Continue anyway</button>
        <button class="btn btn-primary" id="setupContinueBtn" onclick="goToGenerate()" disabled>Continue</button>
      </div>
    </div>
  </div>

  <!-- Phase 2: Generate -->
  <div class="phase generate-phase active" id="phaseGenerate">
    <div class="generate-card">
      <div class="generate-title">What do you want to build?</div>
      <div class="generate-subtitle">Describe your app idea. Be as specific or vague as you like.</div>
      <textarea class="generate-textarea" id="generatePrompt" placeholder="A task manager with categories and drag-to-reorder..."
        onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();startGenerate();}"></textarea>
      <div class="theme-select-row">
        <span class="theme-select-label">Theme:</span>
        <select class="theme-select" id="themeSelect">
          <option value="">Auto (let AI choose)</option>
        </select>
      </div>
      <div class="generate-actions" id="generateActions">
        <button class="btn btn-primary" id="generateBtn" onclick="startGenerate()">Generate</button>
      </div>
      <div class="generate-progress" id="generateProgress">
        <div class="thinking-header">
          <div class="thinking-dots">
            <div class="thinking-dot"></div><div class="thinking-dot"></div><div class="thinking-dot"></div>
          </div>
          <span class="thinking-stage" id="genStage">Starting...</span>
        </div>
        <div class="thinking-progress-bar">
          <div class="thinking-progress-fill" id="genProgressFill" style="width: 0%"></div>
        </div>
        <div class="thinking-footer">
          <span class="thinking-pct" id="genPct">0%</span>
          <span class="thinking-timer" id="genTimer">0s</span>
          <button class="thinking-cancel" onclick="cancelRequest()">Cancel</button>
        </div>
      </div>
      <div class="generate-error" id="generateError" style="display:none;background:var(--vibes-red);color:white;padding:0.75rem 1rem;border-radius:8px;font-size:0.85rem;margin-top:0.75rem;word-break:break-word;"></div>
      <div id="existingAppSection" style="display:none;">
        <div class="generate-or">&#8212; or &#8212;</div>
        <div class="generate-existing">
          <button class="btn btn-secondary" onclick="useExistingApp()">Use existing app.jsx</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Phase 3: Edit + Deploy -->
  <div class="phase edit-phase" id="phaseEdit">
    <!-- Preview -->
    <div class="preview-panel" id="previewPanel">
      <iframe class="preview-iframe" id="previewFrame" src="about:blank"></iframe>
    </div>

    <!-- Splitter -->
    <div class="splitter" id="splitter"></div>

    <!-- Chat -->
    <div class="chat-panel" id="chatPanel">
      <div class="chat-messages" id="chatMessages">
        <div class="chat-bubble system">Your app is ready. Send a message to iterate, switch themes, or deploy when you're happy with it.</div>
      </div>
      <div class="chat-input-bar">
        <textarea class="chat-input" id="chatInput" placeholder="Describe changes to your app..." rows="1"
          onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
        <button class="chat-send" id="sendBtn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <!-- Theme Modal -->
  <div class="modal-overlay" id="themeModal">
    <div class="modal">
      <div class="modal-header">
        <div style="display:flex;align-items:center;gap:0.75rem;">
          <h2>Choose a Theme</h2>
          <span id="currentThemeBadge" style="font-size:0.6875rem;background:var(--vibes-blue);color:var(--vibes-cream);padding:0.15rem 0.5rem;border-radius:4px;font-weight:700;text-transform:uppercase;display:none;"></span>
        </div>
        <button class="modal-close" onclick="closeThemeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <input type="text" class="theme-search" id="themeSearch" placeholder="Search themes..." oninput="filterThemes(this.value)" />
        <div id="themeGrid"></div>
      </div>
    </div>
  </div>

</div>
</div>

<script>
  // === Helpers ===
  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // === State ===
  let ws = null;
  let isThinking = false;
  let themes = [];
  let currentPhase = 'generate';
  let deployTargets = { cloudflare: false, exe: false };
  let pendingThemeId = null;
  let currentThemeId = null;

  // === Phase Navigation ===
  function setPhase(phase) {
    currentPhase = phase;
    document.querySelectorAll('.phase').forEach(p => p.classList.remove('active'));
    document.getElementById('phase' + phase.charAt(0).toUpperCase() + phase.slice(1)).classList.add('active');

    const headerRight = document.getElementById('headerRight');
    if (phase === 'edit') {
      headerRight.innerHTML = `
        <div class="navbar-button-wrapper">
          <button style="background:#5398c9" onclick="openThemeModal()">
            <div class="navbar-button-icon">
              <svg width="35" height="35" viewBox="0 0 35 35" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="17.5" cy="17.5" r="17.5" fill="#231F20"/>
                <path d="M17.5 8C12.25 8 8 11.36 8 15.5c0 2.48 1.73 4.67 4.35 6.03-.15 1.22-.78 2.34-1.85 3.07a.5.5 0 00.3.9c2.1 0 3.82-.88 4.93-2.04.56.03 1.14.04 1.77.04 5.25 0 9.5-3.36 9.5-7.5S22.75 8 17.5 8z" fill="var(--vibes-cream)"/>
                <circle cx="13" cy="14.5" r="1.5" fill="#231F20"/>
                <circle cx="17.5" cy="13" r="1.5" fill="#231F20"/>
                <circle cx="22" cy="14.5" r="1.5" fill="#231F20"/>
              </svg>
            </div>
            <div class="navbar-button-label">Themes</div>
          </button>
        </div>
        <div class="navbar-button-wrapper">
          <button style="background:#eab308" onclick="reloadPreview()">
            <div class="navbar-button-icon">
              <svg width="35" height="35" viewBox="0 0 35 35" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="17.5" cy="17.5" r="17.5" fill="#231F20"/>
                <path d="M24.5 17.5a7 7 0 01-12.6 4.2l-1.4 1.4A9 9 0 0026.5 17.5h-2z" fill="var(--vibes-cream)"/>
                <path d="M10.5 17.5a7 7 0 0112.6-4.2l1.4-1.4A9 9 0 008.5 17.5h2z" fill="var(--vibes-cream)"/>
                <path d="M24.5 17.5l2.5-2.5M24.5 17.5l2.5 2.5M10.5 17.5L8 15M10.5 17.5L8 20" stroke="var(--vibes-cream)" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </div>
            <div class="navbar-button-label" style="color:var(--vibes-near-black);text-shadow:none">Reload</div>
          </button>
        </div>
        <div class="navbar-button-wrapper deploy-dropdown" id="deployDropdown">
          <button style="background:var(--vibes-green)" onclick="toggleDeployMenu()">
            <div class="navbar-button-icon">
              <svg width="35" height="35" viewBox="0 0 35 35" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="17.5" cy="17.5" r="17.5" fill="#231F20"/>
                <path d="M17.5 9l7 7h-4.5v7h-5v-7H10.5l7-7z" fill="var(--vibes-cream)"/>
                <rect x="11" y="25" width="13" height="2" rx="1" fill="var(--vibes-cream)"/>
              </svg>
            </div>
            <div class="navbar-button-label">Deploy</div>
          </button>
          <div class="deploy-menu" id="deployMenu">
            <div style="padding:0.65rem 1rem;border-bottom:1px solid rgba(0,0,0,0.1);">
              <label style="font-size:0.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:#555;">App Name</label>
              <input type="text" id="deployNameInput" placeholder="my-app"
                style="width:100%;margin-top:0.25rem;padding:0.35rem 0.5rem;border:2px solid var(--vibes-near-black);border-radius:8px;font-size:0.8125rem;font-family:inherit;outline:none;background:white;"
                onclick="event.stopPropagation()" />
            </div>
            <button class="deploy-option" id="deployCf" onclick="startDeploy('cloudflare')" disabled>
              <span class="deploy-option-icon">&#9729;</span>
              <div>
                <div>Cloudflare Workers</div>
                <div class="deploy-option-detail" id="deployCfDetail">Checking...</div>
              </div>
            </button>
            <button class="deploy-option" id="deployExe" onclick="startDeploy('exe')" disabled>
              <span class="deploy-option-icon">&#128421;</span>
              <div>
                <div>exe.dev VM</div>
                <div class="deploy-option-detail" id="deployExeDetail">Checking...</div>
              </div>
            </button>
          </div>
        </div>`;
      updateDeployButtons();
    } else {
      headerRight.innerHTML = '';
    }
  }

  // === WebSocket ===
  function connectWs() {
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${protocol}//${location.host}`);

    ws.onopen = () => {
      console.log('[WS] Connected');
    };

    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);

      if (msg.type === 'status') {
        if (currentPhase === 'generate') {
          updateGenerateProgress(msg.progress, msg.stage, msg.elapsed);
        } else {
          setThinking(true, msg.progress, msg.stage, msg.elapsed);
        }
      } else if (msg.type === 'chat') {
        setThinking(false);
        addMessage(msg.role, msg.content);
      } else if (msg.type === 'app_updated') {
        setThinking(false);
        if (currentPhase === 'generate') {
          setPhase('edit');
          loadPreview();
        } else {
          reloadPreview();
        }
      } else if (msg.type === 'error') {
        setThinking(false);
        if (currentPhase === 'generate') {
          document.getElementById('generateProgress').classList.remove('active');
          document.getElementById('generateActions').style.display = '';
          document.getElementById('generateBtn').disabled = false;
          const errEl = document.getElementById('generateError');
          errEl.textContent = msg.message;
          errEl.style.display = '';
        }
        addMessage('error', msg.message);
      } else if (msg.type === 'cancelled') {
        setThinking(false);
        if (currentPhase === 'generate') {
          document.getElementById('generateProgress').classList.remove('active');
          document.getElementById('generateActions').style.display = '';
          document.getElementById('generateBtn').disabled = false;
        }
        addMessage('system', 'Request cancelled.');
      } else if (msg.type === 'deploy_complete') {
        setThinking(false);
        addMessage('deploy-success', 'Deployed! ' + (msg.url || ''));
      }
    };

    ws.onclose = () => {
      console.log('[WS] Disconnected, reconnecting in 2s...');
      setTimeout(connectWs, 2000);
    };

    ws.onerror = (err) => {
      console.error('[WS] Error:', err);
    };
  }

  // === Phase 1: Setup ===
  async function checkSetup() {
    try {
      const res = await fetch('/editor/status');
      const status = await res.json();
      renderChecklist(status);
    } catch (err) {
      document.getElementById('setupChecklist').innerHTML = `
        <div class="setup-item">
          <div class="setup-icon fail">&#10007;</div>
          <div>
            <div class="setup-label">Failed to check dependencies</div>
            <div class="setup-detail">${escapeHtml(err.message)}</div>
          </div>
        </div>`;
      document.getElementById('setupActions').style.display = '';
      document.getElementById('setupSkipBtn').style.display = '';
    }
  }

  function renderChecklist(status) {
    const items = [
      { key: 'clerk', label: 'Clerk keys', detail: status.clerk?.detail || '', required: true },
      { key: 'connect', label: 'Connect Studio', detail: status.connect?.detail || '', required: true },
      { key: 'wrangler', label: 'Cloudflare (wrangler)', detail: status.wrangler?.detail || '', required: false },
      { key: 'ssh', label: 'exe.dev SSH', detail: status.ssh?.detail || '', required: false },
    ];

    deployTargets.cloudflare = status.wrangler?.ok || false;
    deployTargets.exe = status.ssh?.ok || false;

    const requiredOk = items.filter(i => i.required).every(i => status[i.key]?.ok);
    const allOk = items.every(i => status[i.key]?.ok);

    let html = '';
    for (const item of items) {
      const s = status[item.key] || {};
      const iconClass = s.ok ? 'pass' : (item.required ? 'fail' : 'optional');
      const iconChar = s.ok ? '&#10003;' : (item.required ? '&#10007;' : '&#8212;');
      html += `<div class="setup-item">
        <div class="setup-icon ${iconClass}">${iconChar}</div>
        <div>
          <div class="setup-label">${escapeHtml(item.label)}${!item.required ? ' <span style="font-size:0.7rem;color:#888;">(optional)</span>' : ''}</div>
          ${item.detail ? `<div class="setup-detail">${escapeHtml(item.detail)}</div>` : ''}
        </div>
      </div>`;
    }
    document.getElementById('setupChecklist').innerHTML = html;
    document.getElementById('setupActions').style.display = '';

    if (requiredOk) {
      document.getElementById('setupContinueBtn').disabled = false;
      if (allOk) {
        // Auto-advance after a brief flash
        setTimeout(() => goToGenerate(), 800);
      }
    } else {
      document.getElementById('setupSkipBtn').style.display = '';
      document.getElementById('setupContinueBtn').disabled = true;
      // Show hint
      const hint = document.createElement('div');
      hint.style.cssText = 'font-size:0.75rem;color:var(--vibes-red);margin-top:0.75rem;';
      hint.textContent = 'Clerk keys and Connect Studio are required. Run /vibes:connect in your terminal to set up.';
      document.getElementById('setupActions').before(hint);
    }
  }

  function skipSetup() {
    goToGenerate();
  }

  function goToGenerate() {
    setPhase('generate');
  }

  // === Phase 2: Generate ===
  async function populateThemeSelect() {
    try {
      const res = await fetch('/themes');
      themes = await res.json();
      const select = document.getElementById('themeSelect');
      for (const t of themes) {
        const opt = document.createElement('option');
        opt.value = t.id;
        opt.textContent = t.name + (t.mood ? ` — ${t.mood}` : '');
        select.appendChild(opt);
      }
    } catch (err) {
      console.error('Failed to load themes:', err);
    }
  }

  async function checkExistingApp() {
    try {
      const res = await fetch('/editor/app-exists');
      const data = await res.json();
      if (data.exists) {
        document.getElementById('existingAppSection').style.display = '';
      }
    } catch {}
  }

  function startGenerate() {
    const prompt = document.getElementById('generatePrompt').value.trim();
    if (!prompt) {
      const errEl = document.getElementById('generateError');
      errEl.textContent = 'Please describe what you want to build.';
      errEl.style.display = '';
      return;
    }
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      const errEl = document.getElementById('generateError');
      errEl.textContent = 'Not connected to server. Reconnecting...';
      errEl.style.display = '';
      return;
    }

    const themeId = document.getElementById('themeSelect').value;
    if (themeId) currentThemeId = themeId;
    document.getElementById('generateBtn').disabled = true;
    document.getElementById('generateActions').style.display = 'none';
    document.getElementById('generateError').style.display = 'none';
    document.getElementById('generateProgress').classList.add('active');

    ws.send(JSON.stringify({ type: 'generate', prompt, themeId: themeId || null }));
  }

  function useExistingApp() {
    setPhase('edit');
    loadPreview();
  }

  function updateGenerateProgress(progress, stage, elapsed) {
    const fill = document.getElementById('genProgressFill');
    const pct = document.getElementById('genPct');
    const stageEl = document.getElementById('genStage');
    const timerEl = document.getElementById('genTimer');
    if (fill) fill.style.width = (progress || 0) + '%';
    if (pct) pct.textContent = (progress || 0) + '%';
    if (stageEl && stage) stageEl.textContent = stage;
    if (timerEl && elapsed != null) timerEl.textContent = formatElapsed(elapsed);
  }

  // === Phase 3: Edit + Deploy ===
  function loadPreview() {
    const frame = document.getElementById('previewFrame');
    frame.src = '/app-frame?t=' + Date.now();
  }

  function reloadPreview() {
    const frame = document.getElementById('previewFrame');

    if (pendingThemeId) {
      const themeToSet = pendingThemeId;
      pendingThemeId = null;
      frame.onload = () => {
        try {
          const iframeDoc = frame.contentDocument || frame.contentWindow.document;
          frame.contentWindow.localStorage.setItem('vibes-theme', themeToSet);
          iframeDoc.dispatchEvent(new CustomEvent('vibes-design-request', { detail: { theme: themeToSet } }));
        } catch (e) {
          console.warn('[Preview] Could not dispatch theme event:', e);
        }
        frame.onload = null;
      };
    }

    frame.src = '/app-frame?t=' + Date.now();
  }

  function updateDeployButtons() {
    const cfBtn = document.getElementById('deployCf');
    const exeBtn = document.getElementById('deployExe');
    if (cfBtn) {
      cfBtn.disabled = !deployTargets.cloudflare;
      document.getElementById('deployCfDetail').textContent = deployTargets.cloudflare ? 'Ready' : 'wrangler not configured';
    }
    if (exeBtn) {
      exeBtn.disabled = !deployTargets.exe;
      document.getElementById('deployExeDetail').textContent = deployTargets.exe ? 'Ready' : 'SSH not configured';
    }
  }

  function toggleDeployMenu() {
    const menu = document.getElementById('deployMenu');
    menu.classList.toggle('open');
  }

  function startDeploy(target) {
    if (isThinking || !ws || ws.readyState !== WebSocket.OPEN) return;
    const nameInput = document.getElementById('deployNameInput');
    const name = (nameInput ? nameInput.value.trim() : '').replace(/[^a-z0-9-]/g, '');
    if (!name) {
      nameInput.style.borderColor = 'var(--vibes-red)';
      nameInput.focus();
      return;
    }
    nameInput.style.borderColor = 'var(--vibes-near-black)';
    document.getElementById('deployMenu').classList.remove('open');
    addMessage('user', 'Deploy "' + name + '" to ' + (target === 'cloudflare' ? 'Cloudflare Workers' : 'exe.dev'));
    ws.send(JSON.stringify({ type: 'deploy', target, name }));
  }

  // Close deploy menu on outside click
  document.addEventListener('click', (e) => {
    const dropdown = document.getElementById('deployDropdown');
    if (dropdown && !dropdown.contains(e.target)) {
      const menu = document.getElementById('deployMenu');
      if (menu) menu.classList.remove('open');
    }
  });

  // === Chat ===
  function sendMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text || isThinking || !ws || ws.readyState !== WebSocket.OPEN) return;

    addMessage('user', text);
    ws.send(JSON.stringify({ type: 'chat', message: text }));
    input.value = '';
    input.style.height = 'auto';
  }

  function addMessage(role, content) {
    const container = document.getElementById('chatMessages');
    const indicator = container.querySelector('.thinking-indicator');
    if (indicator) indicator.remove();

    const bubble = document.createElement('div');
    bubble.className = `chat-bubble ${role}`;

    if (role === 'deploy-success' && content.includes('http')) {
      const urlMatch = content.match(/(https?:\/\/[^\s]+)/);
      if (urlMatch) {
        const url = urlMatch[1];
        const text = content.replace(url, '');
        bubble.textContent = text;
        const link = document.createElement('a');
        link.href = url;
        link.target = '_blank';
        link.textContent = url;
        link.style.color = 'var(--vibes-blue)';
        link.style.textDecoration = 'underline';
        bubble.appendChild(link);
      } else {
        bubble.textContent = content;
      }
    } else {
      bubble.textContent = content;
    }

    container.appendChild(bubble);
    container.scrollTop = container.scrollHeight;
  }

  function formatElapsed(seconds) {
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    return m > 0 ? `${m}m ${s}s` : `${s}s`;
  }

  function cancelRequest() {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'cancel' }));
    }
  }

  function setThinking(thinking, progress, stage, elapsed) {
    isThinking = thinking;
    const panel = document.getElementById('previewPanel');
    const sendBtn = document.getElementById('sendBtn');
    const container = document.getElementById('chatMessages');

    if (thinking) {
      if (panel) panel.classList.add('thinking');
      if (sendBtn) sendBtn.disabled = true;

      let indicator = container.querySelector('.thinking-indicator');
      if (indicator) {
        const fill = indicator.querySelector('.thinking-progress-fill');
        const pct = indicator.querySelector('.thinking-pct');
        const stageEl = indicator.querySelector('.thinking-stage');
        const timerEl = indicator.querySelector('.thinking-timer');
        if (fill) fill.style.width = (progress || 0) + '%';
        if (pct) pct.textContent = (progress || 0) + '%';
        if (stageEl && stage) stageEl.textContent = stage;
        if (timerEl && elapsed != null) timerEl.textContent = formatElapsed(elapsed);
      } else {
        indicator = document.createElement('div');
        indicator.className = 'thinking-indicator';
        indicator.innerHTML = `
          <div class="thinking-header">
            <div class="thinking-dots">
              <div class="thinking-dot"></div><div class="thinking-dot"></div><div class="thinking-dot"></div>
            </div>
            <span class="thinking-stage">${stage || 'Starting...'}</span>
          </div>
          <div class="thinking-progress-bar">
            <div class="thinking-progress-fill" style="width: ${progress || 0}%"></div>
          </div>
          <div class="thinking-footer">
            <span class="thinking-pct">${progress || 0}%</span>
            <span class="thinking-timer">${formatElapsed(elapsed || 0)}</span>
            <button class="thinking-cancel" onclick="cancelRequest()">Cancel</button>
          </div>`;
        container.appendChild(indicator);
      }
      container.scrollTop = container.scrollHeight;
    } else {
      if (panel) {
        panel.classList.remove('thinking');
        panel.classList.add('updated');
        setTimeout(() => panel.classList.remove('updated'), 600);
      }
      if (sendBtn) sendBtn.disabled = false;

      const indicator = container.querySelector('.thinking-indicator');
      if (indicator) indicator.remove();
    }
  }

  // === Themes ===
  function renderThemeGrid(filter) {
    const grid = document.getElementById('themeGrid');
    const q = (filter || '').toLowerCase().trim();

    const filtered = q
      ? themes.filter(t => `${t.name} ${t.mood} ${t.bestFor}`.toLowerCase().includes(q))
      : themes;

    const recommended = filtered.filter(t => t.recommended);
    const rest = filtered.filter(t => !t.recommended);

    function swatchHtml(colors) {
      if (!colors) return '';
      const bg = colors.bg || '#333';
      const text = colors.text || '#fff';
      const accent = colors.accent || '#888';
      const muted = colors.muted || '#666';
      return `<div class="theme-swatches">
        <div class="theme-swatch-bar">
          <div class="theme-swatch-segment" style="background:${bg};flex:3"></div>
          <div class="theme-swatch-segment" style="background:${text};flex:1"></div>
          <div class="theme-swatch-segment" style="background:${accent};flex:2"></div>
          <div class="theme-swatch-segment" style="background:${muted};flex:1"></div>
        </div>
      </div>`;
    }

    function cardHtml(t) {
      return `<div class="theme-card${t.recommended ? ' recommended' : ''}" onclick="selectTheme('${t.id}')">
        ${swatchHtml(t.colors)}
        <div class="theme-card-name">${t.name}${t.recommended ? '<span class="theme-card-badge">recommended</span>' : ''}</div>
        <div class="theme-card-mood">${t.mood}</div>
        <div class="theme-card-for">${t.bestFor}</div>
      </div>`;
    }

    let html = '';
    if (recommended.length > 0) {
      html += `<div class="theme-section-label">Recommended for your app</div>`;
      html += `<div class="theme-grid">${recommended.map(cardHtml).join('')}</div>`;
    }
    if (rest.length > 0) {
      html += `<div class="theme-section-label all">${recommended.length > 0 ? 'All themes' : 'Themes'}</div>`;
      html += `<div class="theme-grid">${rest.map(cardHtml).join('')}</div>`;
    }
    if (filtered.length === 0) {
      html = `<div style="text-align:center;color:#555;padding:2rem;">No themes match "${filter}"</div>`;
    }
    grid.innerHTML = html;
  }

  function filterThemes(value) {
    renderThemeGrid(value);
  }

  function selectTheme(themeId) {
    if (isThinking || !ws || ws.readyState !== WebSocket.OPEN) return;
    const theme = themes.find(t => t.id === themeId);
    addMessage('user', `Switch to theme: ${theme ? theme.name : themeId}`);
    pendingThemeId = themeId;
    currentThemeId = themeId;
    ws.send(JSON.stringify({ type: 'theme', themeId }));
    closeThemeModal();
  }

  function openThemeModal() {
    document.getElementById('themeModal').classList.add('open');
    const search = document.getElementById('themeSearch');
    search.value = '';
    renderThemeGrid();
    // Show current theme badge
    const badge = document.getElementById('currentThemeBadge');
    if (currentThemeId && badge) {
      const t = themes.find(th => th.id === currentThemeId);
      badge.textContent = 'Current: ' + (t ? t.name : currentThemeId);
      badge.style.display = '';
    } else if (badge) {
      badge.style.display = 'none';
    }
    setTimeout(() => search.focus(), 100);
  }

  function closeThemeModal() {
    document.getElementById('themeModal').classList.remove('open');
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeThemeModal();
  });

  document.getElementById('themeModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeThemeModal();
  });

  // === Resizable Splitter ===
  (function() {
    const splitter = document.getElementById('splitter');
    const preview = document.getElementById('previewPanel');
    let isDragging = false;

    splitter.addEventListener('mousedown', (e) => {
      isDragging = true;
      splitter.classList.add('dragging');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const mainRect = document.getElementById('phaseEdit').getBoundingClientRect();
      const pct = ((e.clientX - mainRect.left) / mainRect.width) * 100;
      const clamped = Math.max(30, Math.min(80, pct));
      preview.style.flex = `0 0 ${clamped}%`;
    });

    document.addEventListener('mouseup', () => {
      if (!isDragging) return;
      isDragging = false;
      splitter.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    });
  })();

  // === Auto-resize textarea ===
  document.getElementById('chatInput').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  // === Init ===
  connectWs();
  // Run setup check silently — store results for deploy
  fetch('/editor/status').then(r => r.json()).then(status => {
    deployTargets.cloudflare = status.wrangler?.ok || false;
    deployTargets.exe = status.ssh?.ok || false;
  }).catch(() => {});
  // Load themes + check existing app + fetch initial prompt immediately
  populateThemeSelect();
  checkExistingApp();
  fetch('/editor/initial-prompt').then(r => r.json()).then(data => {
    if (data.prompt) document.getElementById('generatePrompt').value = data.prompt;
  }).catch(() => {});
  document.getElementById('generatePrompt').focus();
</script>
</div>
</div>
