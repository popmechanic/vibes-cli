<script type="text/babel" data-type="module">
      import React, { createContext, useContext, useState, useEffect, useRef, useCallback, useMemo } from "react";
      import ReactDOMClient from "react-dom/client";
      import { createMergeableStore } from "tinybase/mergeable-store";
      import { createLocalPersister } from "tinybase/persisters/persister-browser";
      import { createWsSynchronizer } from "tinybase/synchronizers/synchronizer-ws-client";
      import { Provider, useTable, useRow, useCell, useValue, useValues, useRowIds, useSortedRowIds, useRowCount, useHasRow, useHasCell, useHasValue, useCellIds, useTableIds, useAddRowCallback, useSetCellCallback, useSetRowCallback, useSetPartialRowCallback, useDelRowCallback, useDelCellCallback, useDelTableCallback, useSetValueCallback, useDelValueCallback, useCellState, useRowState, useValueState } from "tinybase/ui-react";

      // Expose TinyBase hooks as globals for generated app code
      window.useTable = useTable;
      window.useRow = useRow;
      window.useCell = useCell;
      window.useValue = useValue;
      window.useValues = useValues;
      window.useRowIds = useRowIds;
      window.useSortedRowIds = useSortedRowIds;
      window.useRowCount = useRowCount;
      window.useHasRow = useHasRow;
      window.useHasCell = useHasCell;
      window.useHasValue = useHasValue;
      window.useCellIds = useCellIds;
      window.useTableIds = useTableIds;
      window.useAddRowCallback = useAddRowCallback;
      window.useSetCellCallback = useSetCellCallback;
      window.useSetRowCallback = useSetRowCallback;
      window.useSetPartialRowCallback = useSetPartialRowCallback;
      window.useDelRowCallback = useDelRowCallback;
      window.useDelCellCallback = useDelCellCallback;
      window.useDelTableCallback = useDelTableCallback;
      window.useSetValueCallback = useSetValueCallback;
      window.useDelValueCallback = useDelValueCallback;
      window.useCellState = useCellState;
      window.useRowState = useRowState;
      window.useValueState = useValueState;

      // --- App Context (TinyBase) ---
      const AppContext = createContext(null);
      function useApp() { return useContext(AppContext); }
      window.useApp = useApp;

      // --- Reconnecting WebSocket Synchronizer ---
      function createReconnectingSynchronizer(store, wsUrl, onStatusChange) {
        let synchronizer = null;
        let backoff = 1000;
        let destroyed = false;
        let reconnectTimer = null;
        function scheduleReconnect() {
          if (destroyed || reconnectTimer) return;
          reconnectTimer = setTimeout(() => { reconnectTimer = null; connect(); }, Math.min(backoff *= 2, 30000));
        }
        let connecting = false;
        async function connect() {
          if (destroyed || connecting) return;
          connecting = true;
          try {
            if (synchronizer) { try { synchronizer.destroy(); } catch {} synchronizer = null; }
            const ws = new WebSocket(wsUrl);
            synchronizer = await createWsSynchronizer(store, ws);
            await synchronizer.startSync();
            backoff = 1000;
            onStatusChange(true);
            ws.addEventListener('error', () => {});
            ws.addEventListener('close', () => { onStatusChange(false); scheduleReconnect(); });
          } catch { scheduleReconnect(); } finally { connecting = false; }
        }
        connect();
        return () => { destroyed = true; clearTimeout(reconnectTimer); synchronizer?.destroy(); };
      }

      // Create MergeableStore with unique client ID
      let clientId = localStorage.getItem('tinybase_client_id');
      if (!clientId) { clientId = crypto.randomUUID(); localStorage.setItem('tinybase_client_id', clientId); }
      const store = createMergeableStore(clientId);

      // === Menu Components from window (defined in module script above) ===
      const HiddenMenuWrapper = window.HiddenMenuWrapper;
      const VibesPanel = window.VibesPanel;
      // Shared error components from base template
      const ConfigError = window.ConfigError;
      const LoadingError = window.LoadingError;
      // AuthScreen and VibesButton for styled auth views
      const AuthScreen = window.AuthScreen;
      const VibesButton = window.VibesButton;
      const RED = window.RED;
      const YELLOW = window.YELLOW;

      // === Configuration ===
      const CONFIG = {
        oidcAuthority: "__OIDC_AUTHORITY__",
        oidcClientId: "__OIDC_CLIENT_ID__",
        appName: "__APP_NAME__",
        appTitle: "__APP_TITLE__",
        domain: "__APP_DOMAIN__",
        billingMode: "__BILLING_MODE__",
        features: __FEATURES__,
        tagline: "__APP_TAGLINE__",
        subtitle: "__APP_SUBTITLE__",
        adminUserIds: __ADMIN_USER_IDS__,
        reservedSubdomains: __RESERVED_SUBDOMAINS__,
        registryUrl: "__REGISTRY_URL__",
        planQuotas: __PLAN_QUOTAS__
      };

      // Convenience aliases
      const OIDC_AUTHORITY = CONFIG.oidcAuthority;
      const OIDC_CLIENT_ID = CONFIG.oidcClientId;
      const APP_NAME = CONFIG.appName;
      const APP_DOMAIN = CONFIG.domain;
      const BILLING_MODE = CONFIG.billingMode;
      const FEATURES = CONFIG.features;
      const APP_TAGLINE = CONFIG.tagline;
      const APP_SUBTITLE = CONFIG.subtitle;
      const ADMIN_USER_IDS = CONFIG.adminUserIds;
      const RESERVED_SUBDOMAINS = CONFIG.reservedSubdomains;
      const REGISTRY_URL = CONFIG.registryUrl;
      const PLAN_QUOTAS = CONFIG.planQuotas;
      const PLAN_SLUGS = Object.keys(PLAN_QUOTAS);

      // Helper to resolve registry API URLs
      function registryApiUrl(path) {
        // If REGISTRY_URL is set and configured, use it as base
        if (REGISTRY_URL && !REGISTRY_URL.startsWith('__')) {
          return REGISTRY_URL.replace(/\/$/, '') + path;
        }
        // Fallback to relative path (same origin)
        return path;
      }

      // Expose registry URL globally for SharingBridge KV dual-write
      // Fall back to current origin when registry lives on same Worker
      window.__VIBES_REGISTRY_URL__ = REGISTRY_URL || window.location.origin;

      // Also use window config for OIDC (same pattern as vibes)
      const vibesConfig = window.__VIBES_CONFIG__ || {};

      // === Registry API Helpers ===
      const registryCache = { data: null, fetchedAt: 0 };
      const REGISTRY_CACHE_TTL = 5000;
      let registryServerAvailable = null;

      async function fetchRegistry(options = {}) {
        const { force } = options;
        const now = Date.now();
        if (!force && registryCache.data && (now - registryCache.fetchedAt) < REGISTRY_CACHE_TTL) {
          return registryCache.data;
        }
        try {
          const res = await fetch(registryApiUrl('/registry.json'));
          if (!res.ok) throw new Error('Failed to fetch registry');
          registryCache.data = await res.json();
          registryCache.fetchedAt = now;
          registryServerAvailable = true;
          return registryCache.data;
        } catch (e) {
          console.warn('Registry fetch failed, using empty defaults:', e);
          registryServerAvailable = false;
          return { claims: {}, reserved: RESERVED_SUBDOMAINS, preallocated: {} };
        }
      }

      function isRegistryAvailable() {
        return registryServerAvailable === true;
      }

      async function checkSubdomainAvailability(subdomain) {
        if (!subdomain || subdomain.length < 3) {
          return { available: false, reason: 'too_short' };
        }
        const normalized = subdomain.toLowerCase().trim();
        if (RESERVED_SUBDOMAINS.includes(normalized)) {
          return { available: false, reason: 'reserved' };
        }
        try {
          const res = await fetch(registryApiUrl(`/check/${normalized}`));
          if (!res.ok) throw new Error('Check failed');
          return await res.json();
        } catch (e) {
          const registry = await fetchRegistry();
          if (registry.reserved?.includes(normalized)) {
            return { available: false, reason: 'reserved' };
          }
          if (normalized in (registry.preallocated || {})) {
            return { available: false, reason: 'preallocated', ownerId: registry.preallocated[normalized] };
          }
          if (normalized in (registry.claims || {})) {
            return { available: false, reason: 'claimed', ownerId: registry.claims[normalized].userId };
          }
          return { available: true };
        }
      }

      async function claimSubdomain(subdomain, token) {
        if (registryServerAvailable === false) {
          return {
            success: false,
            error: 'Subdomain claiming is not available. The app can be used directly via URL.',
            status: 503
          };
        }
        try {
          const res = await fetch(registryApiUrl('/claim'), {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ subdomain: subdomain.toLowerCase().trim() })
          });
          const data = await res.json();
          return { ...data, status: res.status };
        } catch (e) {
          return {
            success: false,
            error: 'Subdomain claiming is not available.',
            status: 503
          };
        }
      }

      // === Route Detection ===
      function getRouteInfo() {
        const hostname = window.location.hostname;
        const params = new URLSearchParams(window.location.search);
        const testSubdomain = params.get('subdomain');

        // Handle localhost for testing
        if (hostname === 'localhost' || hostname === '127.0.0.1') {
          if (testSubdomain === 'admin') return { route: 'admin', subdomain: null };
          if (testSubdomain) return { route: 'tenant', subdomain: testSubdomain };
          return { route: 'landing', subdomain: null };
        }

        // Handle workers.dev (use ?subdomain= param, no wildcard SSL)
        if (hostname.endsWith('.workers.dev')) {
          if (testSubdomain === 'admin') return { route: 'admin', subdomain: null };
          if (testSubdomain) return { route: 'tenant', subdomain: testSubdomain };
          return { route: 'landing', subdomain: null };
        }

        // Production: detect subdomain from hostname using APP_DOMAIN
        if (hostname === APP_DOMAIN || hostname === `www.${APP_DOMAIN}`) {
          return { route: 'landing', subdomain: null };
        }
        if (hostname === `admin.${APP_DOMAIN}`) {
          return { route: 'admin', subdomain: null };
        }
        if (hostname.endsWith(`.${APP_DOMAIN}`)) {
          const subdomain = hostname.slice(0, -(APP_DOMAIN.length + 1));
          return { route: 'tenant', subdomain };
        }

        // Fallback for unrecognized domains (direct worker URL, etc.)
        if (testSubdomain === 'admin') return { route: 'admin', subdomain: null };
        if (testSubdomain) return { route: 'tenant', subdomain: testSubdomain };
        return { route: 'landing', subdomain: null };
      }

      function needsQueryParamRouting() {
        const hostname = window.location.hostname;
        return hostname === 'localhost'
          || hostname === '127.0.0.1'
          || hostname.endsWith('.workers.dev');
      }

      const routeInfo = getRouteInfo();

      // === Tenant Context ===
      const TenantContext = createContext(null);

      function useTenant() {
        const context = useContext(TenantContext);
        if (!context) throw new Error("useTenant must be used within TenantProvider");
        return context;
      }
      window.useTenant = useTenant;

      function TenantProvider({ children, subdomain }) {
        const dbName = `${APP_NAME}-${subdomain}`;
        return (
          <TenantContext.Provider value={{ subdomain, dbName, appName: APP_NAME, domain: APP_DOMAIN }}>
            {children}
          </TenantContext.Provider>
        );
      }

      // __VIBES_APP_CODE__

      // === Module-level gate cache (survives React remounts from OIDCProvider) ===
      const _gateCache = {};  // keyed by "userId:subdomain", stores { phase, role, frozen }

      // Module-level subdomain check — starts before React renders, immune to remount
      const _subdomainCheck = { promise: null, result: null };
      if (routeInfo.route === 'tenant' && routeInfo.subdomain) {
        _subdomainCheck.promise = fetch(registryApiUrl('/check/' + routeInfo.subdomain))
          .then(function(r) { return r.json(); })
          .then(function(d) { _subdomainCheck.result = d; return d; })
          .catch(function() { _subdomainCheck.result = { available: true }; return _subdomainCheck.result; });
      }

      // === Auth Gate (for signed-out users) ===
      function AuthGate({ onSignUp }) {
        const { SignInButton } = window.OIDCComponents || {};
        const appDisplayName = APP_NAME.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());

        React.useEffect(() => {
          const handler = () => {
            if (document.visibilityState === 'visible' && sessionStorage.getItem('vibes-signup-pending')) {
              sessionStorage.removeItem('vibes-signup-pending');
              const btn = document.querySelector('[data-vibes-signin]');
              if (btn) btn.click();
            }
          };
          document.addEventListener('visibilitychange', handler);
          return () => document.removeEventListener('visibilitychange', handler);
        }, []);

        // Guard against undefined components
        if (!SignInButton) {
          return <LoadingError error="Auth components not loaded. Please refresh." />;
        }

        return (
          <AuthScreen
            title={`Welcome to ${appDisplayName}`}
            message="Sign in to access your space."
            showCard={true}
          >
            <SignInButton>
              <VibesButton data-vibes-signin variant={RED} buttonType="form">
                Sign In
              </VibesButton>
            </SignInButton>
          </AuthScreen>
        );
      }

      // === Claim Prompt (for signed-in users on unclaimed subdomains) ===
      function ClaimPrompt({ subdomain, onClaim, onCancel }) {
        const [claiming, setClaiming] = useState(false);
        const [isShredding, setIsShredding] = useState(false);
        const [error, setError] = useState(null);

        const handleClaim = async () => {
          setClaiming(true);
          setError(null);
          try {
            const token = window.__VIBES_OIDC_TOKEN__;
            if (!token) throw new Error('Not authenticated');
            const result = await claimSubdomain(subdomain, token);
            if (result.success) {
              setIsShredding(true);
              setTimeout(() => { onClaim?.(); }, 1200);
              return;
            }
            if (result.reason === 'quota_exceeded') {
              setError(`You've reached your limit of ${result.limit} subdomain${result.limit > 1 ? 's' : ''}. Upgrade your plan to claim more.`);
            } else if (result.reason === 'no_subscription') {
              setError('A subscription is required to claim a subdomain.');
            } else {
              setError(result.error || 'Failed to claim subdomain');
            }
          } catch (e) {
            setError(e.message);
          } finally {
            setClaiming(false);
          }
        };

        return (
          <AuthScreen
            title={`Claim ${subdomain}.${needsQueryParamRouting() ? APP_NAME : APP_DOMAIN}`}
            message={error || "This subdomain is available! Would you like to claim it?"}
            showCard={true}
            isShredding={isShredding}
            isError={!!error}
          >
            <div onClick={handleClaim}>
              <VibesButton variant={RED} buttonType="form" disabled={claiming}>
                {claiming ? 'Claiming...' : 'Claim This Subdomain'}
              </VibesButton>
            </div>
            {onCancel && (
              <div onClick={onCancel} style={{ cursor: 'pointer', textAlign: 'center', color: '#666', fontSize: '0.875rem' }}>
                Cancel
              </div>
            )}
          </AuthScreen>
        );
      }

      // === Subscription Paywall (stub — billing is phase 2) ===
      function SubscriptionPaywall({ subdomain }) {
        const displayDomain = subdomain
          ? `${APP_DOMAIN}/${subdomain}`
          : null;

        return (
          <AuthScreen
            title="Subscription Required"
            message={displayDomain ? `A subscription is required to claim ${displayDomain}. Billing coming soon.` : 'A subscription is required to use this app. Billing coming soon.'}
            showCard={true}
          >
            <div style={{ textAlign: 'center', color: '#666', fontSize: '0.875rem' }}>
              Billing integration is not yet configured.
            </div>
          </AuthScreen>
        );
      }

      // === Subscription Gate (stub — billing is phase 2) ===
      // When billing is integrated (phase 2), this will check subscription status.
      // For now: admin bypass + no billing required = always pass through.
      function SubscriptionGate({ children, subdomain }) {
        const { user } = window.useUser();
        const isAdmin = user?.id && ADMIN_USER_IDS.includes(user.id);

        // Admin bypass
        if (isAdmin) return children;

        // No billing required — pass through (phase 1: always pass)
        if (BILLING_MODE !== 'required') return children;

        // Billing required but not yet integrated — show paywall stub
        return <SubscriptionPaywall subdomain={subdomain} />;
      }

      // === Access Denied ===
      function AccessDenied({ subdomain }) {
        const displayDomain = `${APP_DOMAIN}/${subdomain}`;
        const landingUrl = needsQueryParamRouting() ? window.location.origin : `https://${APP_DOMAIN}`;

        return (
          <AuthScreen
            title="Access Denied"
            message={`${displayDomain} belongs to another user.`}
            showCard={true}
            isError={true}
          >
            <a href={landingUrl} style={{ textDecoration: 'none' }}>
              <VibesButton variant={YELLOW} buttonType="form">
                Get Your Own
              </VibesButton>
            </a>
          </AuthScreen>
        );
      }

      // === Wrapper Components (use useUser hook instead of render props) ===

      function ClaimPromptWrapper({ subdomain, onClaimSuccess }) {
        const { user } = window.useUser();

        return (
          <ClaimPrompt
            subdomain={subdomain}
            onClaim={() => onClaimSuccess(user?.id)}
          />
        );
      }

      // === Unified Access Gate (registry-based resolution with module-level cache) ===
      function UnifiedAccessGate({ subdomain }) {
        const { user, isLoaded } = window.useUser();

        // Initialize from cache if available (survives remounts)
        const [state, setState] = useState(function() {
          // Check subdomain-only key first (always written, survives remounts)
          var subCached = _gateCache[subdomain];
          if (subCached && subCached.phase === 'resolved') return subCached;
          if (user?.id) {
            var cached = _gateCache[user.id + ':' + subdomain];
            if (cached && cached.phase === 'resolved') return cached;
          }
          var anonCached = _gateCache['__anon__:' + subdomain];
          if (anonCached && anonCached.phase === 'resolved') return anonCached;
          return { phase: 'init', role: null, frozen: false, error: null };
        });

        const resolvedForRef = useRef(null);
        const [oidcTimedOut, setOidcTimedOut] = useState(false);

        // Write-through setState that caches to module level
        const setGateState = useCallback(function(newState) {
          var key = (user?.id || '__anon__') + ':' + subdomain;
          _gateCache[key] = newState;
          // Only cache owner/collaborator at subdomain level (prevents stale 'none' flash on auth remount)
          if (newState.role === 'owner' || newState.role === 'collaborator') {
            _gateCache[subdomain] = newState;
          }
          setState(newState);
        }, [user?.id, subdomain]);

        // OIDC initialization timeout
        useEffect(function() {
          if (isLoaded) return;
          var timer = setTimeout(function() { setOidcTimedOut(true); }, 15000);
          return function() { clearTimeout(timer); };
        }, [isLoaded]);

        // Hook must be called unconditionally (Rules of Hooks)
        window.useVibesPanelEvents('Sell');

        const fpCtx = typeof window.useOIDCContext === 'function'
          ? window.useOIDCContext() : null;
        const dashApiRef = useRef(null);
        dashApiRef.current = fpCtx?.dashApi || null;

        // Main resolution effect
        useEffect(function() {
          var userKey = (user?.id || '__anon__') + ':' + subdomain;
          if (resolvedForRef.current === userKey) return;

          // Cache check BEFORE isLoaded — survives OIDC remounts
          var cached = _gateCache[userKey] || _gateCache[subdomain];
          if (cached && cached.phase === 'resolved') {
            resolvedForRef.current = userKey;
            setState(cached);
            return;
          }

          if (!isLoaded) return;

          // Read shared ledger context from URL/localStorage
          var urlLedger = new URLSearchParams(window.location.search).get('ledger');
          var storageKey = 'vibes-shared-ledger-' + subdomain;
          var gateDbName = APP_NAME + '-' + subdomain;
          if (urlLedger) {
            if (!window.__VIBES_LEDGER_MAP__) window.__VIBES_LEDGER_MAP__ = {};
            window.__VIBES_LEDGER_MAP__[gateDbName] = urlLedger;
            window.__VIBES_SHARED_LEDGER__ = urlLedger;
            try { localStorage.setItem(storageKey, urlLedger); } catch(e) {}
          } else {
            var stored = localStorage.getItem(storageKey);
            if (stored) {
              if (!window.__VIBES_LEDGER_MAP__) window.__VIBES_LEDGER_MAP__ = {};
              window.__VIBES_LEDGER_MAP__[gateDbName] = stored;
              window.__VIBES_SHARED_LEDGER__ = stored;
            }
          }

          // === Path 1: Not signed in ===
          if (!user?.id) {
            // Use module-level check if available (no /resolve needed for anon)
            if (_subdomainCheck.result) {
              resolvedForRef.current = userKey;
              var role = _subdomainCheck.result.available ? 'unclaimed' : 'none';
              var resolved = { phase: 'resolved', role: role, frozen: false, error: null };
              setGateState(resolved);
              return;
            }
            // Module-level check still pending — subscribe
            if (_subdomainCheck.promise) {
              _subdomainCheck.promise.then(function(data) {
                resolvedForRef.current = userKey;
                var role = data.available ? 'unclaimed' : 'none';
                setGateState({ phase: 'resolved', role: role, frozen: false, error: null });
              });
              return;
            }
            // No module-level check (shouldn't happen for tenant route, but fallback)
            var anonCtrl = new AbortController();
            var anonTimeout = setTimeout(function() { anonCtrl.abort(); }, 10000);
            fetch(registryApiUrl('/resolve/' + subdomain), { signal: anonCtrl.signal })
              .then(function(res) { return res.json(); })
              .then(function(data) {
                resolvedForRef.current = userKey;
                setGateState({ phase: 'resolved', role: data.role || 'none', frozen: data.frozen || false, error: null });
              })
              .catch(function() {
                resolvedForRef.current = userKey;
                setGateState({ phase: 'error', role: null, frozen: false, error: 'Failed to resolve access' });
              })
              .finally(function() { clearTimeout(anonTimeout); });
            return;
          }

          // === Path 2: Signed in — always resolve via registry ===
          // (No JWT claims path — registry is sole source of truth)

          var doResolve = function(checkResult) {
            if (checkResult && checkResult.available) {
              // Subdomain is unclaimed — show ClaimPrompt
              resolvedForRef.current = userKey;
              setGateState({ phase: 'resolved', role: 'unclaimed', frozen: false, error: null });
              return;
            }

            // Subdomain is taken — need /resolve to check user's role
            var email = user.email;
            var resolveUrl = registryApiUrl('/resolve/' + subdomain + '?userId=' + user.id);
            if (email) resolveUrl += '&email=' + encodeURIComponent(email);
            var resolveCtrl = new AbortController();
            var resolveTimeout = setTimeout(function() { resolveCtrl.abort(); }, 10000);

            // Use OIDC token for authenticated /resolve
            var token = window.__VIBES_OIDC_TOKEN__;
            var headers = {};
            if (token) headers['Authorization'] = 'Bearer ' + token;

            fetch(resolveUrl, { headers: headers, signal: resolveCtrl.signal })
            .then(function(res) { return res.json(); })
            .then(function(data) {
              var role = data.role || 'none';
              var frozen = data.frozen || false;

              // Bridge ledgerId for collaborators
              if (data.ledgerId) {
                var resolvedDbName = APP_NAME + '-' + subdomain;
                if (!window.__VIBES_LEDGER_MAP__) window.__VIBES_LEDGER_MAP__ = {};
                window.__VIBES_LEDGER_MAP__[resolvedDbName] = data.ledgerId;
                window.__VIBES_SHARED_LEDGER__ = data.ledgerId;
                try { localStorage.setItem(storageKey, data.ledgerId); } catch(e) {}
              }

              // Bridge inviteId for Connect invite redemption
              if (data.inviteId) {
                window.__VIBES_INVITE_ID__ = data.inviteId;
              }

              resolvedForRef.current = userKey;
              setGateState({ phase: 'resolved', role: role, frozen: frozen, error: null });
            }).catch(function(err) {
              resolvedForRef.current = userKey;
              setGateState({ phase: 'error', role: null, frozen: false, error: err.message });
            }).finally(function() { clearTimeout(resolveTimeout); });
          };

          if (_subdomainCheck.result) {
            doResolve(_subdomainCheck.result);
          } else if (_subdomainCheck.promise) {
            _subdomainCheck.promise.then(doResolve);
          } else {
            // No module-level check — do inline check
            fetch(registryApiUrl('/check/' + subdomain))
              .then(function(r) { return r.json(); })
              .then(doResolve)
              .catch(function() { doResolve({ available: false }); });
          }
        }, [isLoaded, user?.id, subdomain]);

        // Separate effect: auto-join for invited users (non-blocking, post-resolution)
        useEffect(function() {
          if (state.phase !== 'resolved') return;
          if (state.role !== 'invited') return;
          if (!user?.id) return;

          var email = user.email;
          if (!email) return;

          (async function() {
            try {
              var token = window.__VIBES_OIDC_TOKEN__;
              if (!token) return;

              var joinCtrl = new AbortController();
              var joinTimeout = setTimeout(function() { joinCtrl.abort(); }, 10000);
              var joinRes = await fetch(registryApiUrl('/join'), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ subdomain: subdomain, email: email }),
                signal: joinCtrl.signal
              });
              clearTimeout(joinTimeout);

              if (joinRes.ok) {
                // Upgrade role to collaborator
                setGateState({ phase: 'resolved', role: 'collaborator', frozen: state.frozen, error: null });

                // Try Connect invite redemption (non-fatal)
                if (dashApiRef.current) {
                  try {
                    var iid = window.__VIBES_INVITE_ID__;
                    await Promise.race([
                      dashApiRef.current.redeemInvite(iid ? { inviteId: iid } : {}),
                      new Promise(function(_, r) { setTimeout(function() { r(new Error('redeemInvite timeout')); }, 5000); })
                    ]);
                  } catch(e) { /* non-fatal */ }
                }
              }
            } catch(e) {
              console.warn('[UnifiedAccessGate] Auto-join failed:', e.message);
            }
          })();
        }, [state.phase, state.role, user?.id, subdomain]);

        // Separate effect: retry Connect invite for existing collaborators (non-blocking)
        // Tries stored inviteId first, falls back to listInvites discovery,
        // then updateUserTenant as last resort if redeemInvite is broken upstream
        useEffect(function() {
          if (state.phase !== 'resolved') return;
          if (state.role !== 'collaborator') return;
          if (!dashApiRef.current) return;

          (async function() {
            try {
              var api = dashApiRef.current;
              console.debug('[vibes] Collaborator retry: dashApi methods available:',
                Object.keys(api).filter(function(k) { return typeof api[k] === 'function'; }).join(', '));
              var inviteId = window.__VIBES_INVITE_ID__;

              // If no stored invite ID, try to discover it via listInvites
              if (!inviteId) {
                try {
                  var rInvites = await Promise.race([
                    api.listInvites({}),
                    new Promise(function(_, r) { setTimeout(function() { r(new Error('listInvites timeout')); }, 5000); })
                  ]);
                  if (rInvites.isOk()) {
                    var invites = rInvites.Ok().tickets || [];
                    if (invites.length > 0) {
                      inviteId = invites[0].id || invites[0].inviteId;
                      console.debug('[vibes] Discovered invite via listInvites:', inviteId);
                    }
                  }
                } catch(e) { /* listInvites not available or timed out */ }
              }

              // Try redeemInvite with explicit ID
              if (inviteId) {
                try {
                  var rRedeem = await Promise.race([
                    api.redeemInvite({ inviteId: inviteId }),
                    new Promise(function(_, r) { setTimeout(function() { r(new Error('redeemInvite timeout')); }, 5000); })
                  ]);
                  if (rRedeem && rRedeem.isOk && rRedeem.isOk()) {
                    console.debug('[vibes] Invite redeemed successfully');
                    return;
                  }
                } catch(e) {
                  console.debug('[vibes] redeemInvite failed:', e.message);
                }
              }

              // Last resort: updateUserTenant (if redeemInvite is broken upstream)
              var gateDbName = APP_NAME + '-' + subdomain;
              var ledgerId = (window.__VIBES_LEDGER_MAP__ && window.__VIBES_LEDGER_MAP__[gateDbName]) || window.__VIBES_SHARED_LEDGER__;
              if (ledgerId && api.updateUserTenant) {
                console.debug('[vibes] Trying updateUserTenant for ledger:', ledgerId);
                try {
                  var rUpdate = await Promise.race([
                    api.updateUserTenant({ ledger: ledgerId, role: 'member', right: 'write' }),
                    new Promise(function(_, r) { setTimeout(function() { r(new Error('updateUserTenant timeout')); }, 5000); })
                  ]);
                  console.debug('[vibes] updateUserTenant succeeded for ledger:', ledgerId, 'result:', rUpdate);
                } catch(e) {
                  console.debug('[vibes] updateUserTenant failed:', e.message);
                }
              } else {
                console.debug('[vibes] updateUserTenant not available on dashApi, ledgerId:', ledgerId);
              }
            } catch(e) { /* non-fatal */ }
          })();
        }, [state.phase, state.role]);

        // --- Render-time cache recovery (survives OIDC remounts) ---
        // React 18+: setState during render → discard current output, re-render immediately
        if (state.phase === 'init') {
          var directCached = _gateCache[subdomain];
          if (directCached && directCached.phase === 'resolved') {
            resolvedForRef.current = (user?.id || '__anon__') + ':' + subdomain;
            setState(directCached);
            return null;  // Current render discarded; React re-renders with resolved state
          }
        }

        // --- Render based on state ---
        const { SignedIn, SignedOut } = window.OIDCComponents || {};
        if (!SignedIn || !SignedOut) {
          return <LoadingError error="Auth components not loaded. Please refresh the page." />;
        }

        // Loading state
        if (state.phase === 'init') {
          if (oidcTimedOut && !isLoaded) {
            return (
              <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: '1rem' }}>
                <p style={{ color: '#94a3b8' }}>Taking longer than expected...</p>
                <button onClick={() => window.location.reload()} style={{ padding: '0.5rem 1rem', cursor: 'pointer', borderRadius: '4px', border: '1px solid #ccc' }}>
                  Reload
                </button>
              </div>
            );
          }
          return (
            <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', opacity: 0, animation: 'vibesDelayedFadeIn 0.3s ease 0.2s forwards' }}>
              <div style={{ color: '#94a3b8' }}>Loading...</div>
            </div>
          );
        }

        // Error state
        if (state.phase === 'error') {
          return (
            <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: '1rem' }}>
              <p>Could not verify access. Check your connection and try again.</p>
              <button onClick={() => { resolvedForRef.current = null; var key = (user?.id || '__anon__') + ':' + subdomain; delete _gateCache[key]; delete _gateCache[subdomain]; setState({ phase: 'init', role: null, frozen: false, error: null }); }} style={{ padding: '0.5rem 1rem', cursor: 'pointer' }}>
                Retry
              </button>
            </div>
          );
        }

        // Resolved states — same render logic as before
        const { role, frozen } = state;

        if (role === 'unclaimed') {
          return (
            <>
              <SignedIn>
                <SubscriptionGate subdomain={subdomain}>
                  <ClaimPromptWrapper subdomain={subdomain} onClaimSuccess={() => { resolvedForRef.current = (user?.id || '__anon__') + ':' + subdomain; setGateState({ phase: 'resolved', role: 'owner', frozen: false, error: null }); }} />
                </SubscriptionGate>
              </SignedIn>
              <SignedOut>
                <AuthGate />
              </SignedOut>
            </>
          );
        }

        if ((role === 'owner' || role === 'collaborator') && frozen) {
          return (
            <>
              <SignedIn>
                <ResubscribePaywall subdomain={subdomain} role={role} />
              </SignedIn>
              <SignedOut>
                <AuthGate />
              </SignedOut>
            </>
          );
        }

        if (role === 'owner' || role === 'collaborator') {
          return (
            <>
              <SignedIn>
                <TenantProvider subdomain={subdomain}>
                  <SharingBridge />
                  <LedgerReporter />
                  <HiddenMenuWrapper menuContent={<VibesPanel />}>
                    <App />
                  </HiddenMenuWrapper>
                </TenantProvider>
              </SignedIn>
              <SignedOut>
                <AuthGate />
              </SignedOut>
            </>
          );
        }

        return (
          <>
            <SignedIn>
              <AccessDenied subdomain={subdomain} />
            </SignedIn>
            <SignedOut>
              <AuthGate />
            </SignedOut>
          </>
        );
      }

      // === Resubscribe Paywall (shown when subdomain is frozen — stub, billing is phase 2) ===
      function ResubscribePaywall({ subdomain, role }) {
        const displayDomain = `${APP_DOMAIN}/${subdomain}`;

        if (role === 'owner') {
          return (
            <AuthScreen title="Subscription Expired" message={`Your subscription has expired. Resubscribe to restore access to ${displayDomain}. Your data is safe.`} showCard={true}>
              <div style={{ textAlign: 'center', color: '#666', fontSize: '0.875rem' }}>
                Billing integration coming soon.
              </div>
            </AuthScreen>
          );
        }

        // Collaborator sees "ask the owner" message
        return (
          <AuthScreen title="App Paused" message={`${displayDomain} is currently paused. Ask the owner to resubscribe to restore access. Your data is safe.`} showCard={true}>
            <div style={{ textAlign: 'center', color: '#666', fontSize: '0.875rem' }}>
              The subscription for this app has expired.
            </div>
          </AuthScreen>
        );
      }

      // === Ledger Reporter (owner reports ledger ID to registry) ===
      // Only owners should report — collaborators get 403 from /set-ledger
      // With OIDC, we rely on the gate's resolved role (cached in _gateCache)
      function LedgerReporter() {
        const { subdomain, dbName } = useTenant();
        const { user } = window.useUser();
        const reportedRef = useRef(false);

        useEffect(function() {
          if (reportedRef.current) return;
          if (!user?.id) return;

          // Check gate cache for owner role (registry is source of truth, no JWT claims)
          var cached = _gateCache[user.id + ':' + subdomain] || _gateCache[subdomain];
          if (!cached || cached.role !== 'owner') {
            console.debug('[vibes] LedgerReporter skipped — not owner of', subdomain);
            return;
          }

          var interval = setInterval(function() {
            var map = window.__VIBES_LEDGER_MAP__;
            if (!map || !map[dbName]) return;

            var ledgerId = map[dbName];
            reportedRef.current = true;
            clearInterval(interval);

            // Fire and forget — report ledger ID to registry
            (async function() {
              try {
                var token = window.__VIBES_OIDC_TOKEN__;
                if (!token) return;
                var res = await fetch(registryApiUrl('/set-ledger'), {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                  },
                  body: JSON.stringify({ subdomain: subdomain, ledgerId: ledgerId })
                });
                if (res.ok) {
                  console.debug('[vibes] Reported ledger ID for', subdomain);
                }
              } catch(e) {
                console.warn('[vibes] Failed to report ledger ID:', e.message);
              }
            })();
          }, 500);

          return function() { clearInterval(interval); };
        }, [user?.id, subdomain, dbName]);

        return null;
      }

      // === Tenant App Wrapper ===
      function TenantApp({ subdomain }) {
        return <UnifiedAccessGate subdomain={subdomain} />;
      }

      // === Admin Dashboard Content (uses useUser hook) ===
      function AdminDashboardContent() {

        const refreshRegistry = useCallback((force = false) => {
          setLoading(true);
          setError(null);
          return fetchRegistry({ force })
            .then(data => { setRegistry(data); setLoading(false); })
            .catch(e => { setError(e.message); setLoading(false); });
        }, []);

        useEffect(() => {
          refreshRegistry();
        }, [refreshRegistry]);

        if (!ADMIN_USER_IDS.includes(user?.id)) {

            <div className="min-h-screen flex items-center justify-center bg-gray-50">

                <UserButton />

              {loading ? (
                <div style={{ textAlign: 'center', padding: '3rem', color: 'var(--admin-text-muted)' }}>Loading registry data...</div>
              ) : error ? (
                <div style={{ textAlign: 'center', padding: '3rem', color: '#ef4444' }}>Failed to load registry: {error}</div>
              ) : (
                <>
                  {/* Stats cards */}
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '1rem', marginBottom: '2rem' }}>
                    {[
                      { label: 'Claimed Subdomains', value: claimEntries.length },

                      { label: 'Billing Mode', value: BILLING_MODE || 'none' }
                    ].map((stat, i) => (
                      <div key={i} style={{
                        background: 'var(--admin-card-bg)',

                      }}>
                        <div style={{ fontSize: '0.75rem', textTransform: 'uppercase', letterSpacing: '0.05em', color: 'var(--admin-text-muted)', marginBottom: '0.5rem' }}>{stat.label}</div>
                        <div style={{ fontSize: '1.5rem', fontWeight: 700, color: 'var(--admin-text)' }}>{stat.value}</div>
                      </div>
                    ))}
                  </div>

                  {/* Info about billing */}
                  <div style={{
                    background: 'var(--admin-card-bg)',
                    borderRadius: '12px',
                    border: '2px solid var(--admin-border)',
                    boxShadow: '4px 4px 0 var(--admin-shadow)',
                    padding: '1.25rem',
                    marginBottom: '2rem'
                  }}>
                    <h2 style={{ fontSize: '1rem', fontWeight: 600, color: 'var(--admin-text)', marginBottom: '0.5rem' }}>
                      Billing
                    </h2>
                    <p style={{ color: 'var(--admin-text-muted)', fontSize: '0.875rem' }}>
                      Billing integration coming in phase 2 (Stripe). Users can currently
                      claim subdomains without a subscription when billing mode is off.
                    </p>
                  </div>

                  {/* Claims table */}
                  <div style={{
                    background: 'var(--admin-card-bg)',
                    borderRadius: '12px',

                    <div style={{ padding: '1rem 1.25rem', borderBottom: '1px solid rgba(0,0,0,0.08)' }}>

                    </div>
                    {claimEntries.length === 0 ? (
                      <div style={{ padding: '2rem', textAlign: 'center', color: 'var(--admin-text-muted)' }}>No subdomains claimed yet.</div>
                    ) : (
                      <div style={{ overflowX: 'auto' }}>
                        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '0.875rem' }}>

                            ))}
                          </tbody>
                        </table>
                      </div>
                    )}
                  </div>

                  {/* Links */}
                  <div style={{ textAlign: 'center', color: 'var(--admin-text-muted)', fontSize: '0.875rem' }}>
                    Admin dashboard — Pocket ID OIDC
                  </div>
                </>
              )}
            </div>
          </div>
        );
      }

            margin: 0 auto 3rem;
            max-width: 400px;
            text-align: left;
        }

        .landing-page .features-list li {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 0;
            font-size: 1.1rem;
            color: var(--color-foreground, #111111);
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }

        .landing-page .features-list li:last-child {
            border-bottom: none;
        }

        .landing-page .check-icon {
            flex-shrink: 0;
            width: 20px;
            height: 20px;
            background: var(--color-foreground, #111111);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .landing-page .pricing-cta {
            font-family: inherit;
            font-size: 1rem;
            color: #666;
            margin-bottom: 0.75rem;
        }

        .landing-page .pricing-trust {
            display: flex;
            justify-content: center;
            gap: 2rem;
            font-size: 0.8rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        @media (max-width: 768px) {
            .landing-page h1 {
                font-size: 3.5rem;
            }
            .landing-page .btn-start {
                width: 100%;
                justify-content: center;
            }
            .landing-page .pricing-trust {
                flex-direction: column;
                gap: 0.5rem;
                align-items: center;
            }
        }
      `;

      // === Pricing Section (shown on landing page when billing is required) ===
      function PricingSection() {
        if (BILLING_MODE !== 'required' || !FEATURES || FEATURES.length === 0) return null;

        return (
          <div className="pricing-section">
            <h2>What You Get</h2>
            <ul className="features-list">
              {FEATURES.map((feature, i) => (
                <li key={i}>
                  <span className="check-icon">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                      <polyline points="20 6 9 17 4 12" />
                    </svg>
                  </span>
                  {feature}
                </li>
              ))}
            </ul>
            <p className="pricing-cta">Get started — plans start after signup</p>
            <div className="pricing-trust">
              <span>Cancel anytime</span>
              <span>No credit card to try</span>
            </div>
          </div>
        );
      }

      // === Landing Page Component — Subscribe CTA ===
      // Path-based tenancy: users do NOT pick a slug here. The slug is
      // auto-generated from their email in factory-worker/src/routes/checkout.ts
      // after Stripe Checkout completes. This component's only job is to
      // trigger that flow.
      function LandingPage() {
        const [submitting, setSubmitting] = useState(false);
        const [error, setError] = useState(null);
        const copyrightRef = useRef(null);

        // Set copyright year
        useEffect(() => {
          if (copyrightRef.current) {
            copyrightRef.current.textContent = '© ' + new Date().getFullYear();
          }
        }, []);

        const handleSubscribe = async () => {
          if (submitting) return;
          setSubmitting(true);
          setError(null);
          try {
            const factoryBase = (window.__APP_CONFIG__ && window.__APP_CONFIG__.factoryBase) || '';
            if (!factoryBase || factoryBase.startsWith('__')) {
              throw new Error('Checkout is not configured for this deployment.');
            }
            const urlParams = new URLSearchParams(window.location.search);
            const ref = urlParams.get('ref');
            const endpoint = factoryBase.replace(/\/$/, '') +
              '/checkout/' + encodeURIComponent(APP_NAME) +
              (ref ? '?ref=' + encodeURIComponent(ref) : '');
            const res = await fetch(endpoint, { method: 'POST' });
            if (!res.ok) {
              const body = await res.text().catch(() => '');
              throw new Error('Checkout session failed (' + res.status + '): ' + body.slice(0, 120));
            }
            const data = await res.json();
            if (!data || !data.url) throw new Error('Checkout response missing url field');
            window.location.href = data.url;
          } catch (err) {
            console.error('[landing] subscribe failed:', err);
            setError(err && err.message ? err.message : 'Unable to start checkout. Please try again.');
            setSubmitting(false);
          }
        };

        // Humanize app name for display (e.g., "cosmic-garden" → "Cosmic Garden")
        const displayName = APP_NAME.replace(/-/g, ' ').replace(/\b\w/g, function (c) { return c.toUpperCase(); });

        return (
          <>
            <style>{landingPageStyles}</style>

            <div className="landing-page">
              {/* Nav - logo only */}
              <nav>
                <div className="logo">{displayName}</div>
              </nav>

              <main>
                <div className="hero-container">
                  <h1 dangerouslySetInnerHTML={{ __html: APP_TAGLINE }} />
                  <p className="subhead">{APP_SUBTITLE}</p>

                  {/* Subscribe CTA — path-based tenancy, slug derived after checkout */}
                  <div className="subscribe-cta">
                    <button
                      className="btn-start"
                      onClick={handleSubscribe}
                      disabled={submitting}
                      aria-busy={submitting}
                    >
                      {submitting ? 'Opening checkout…' : 'Subscribe'}
                      <svg className="arrow-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12" />
                        <polyline points="12 5 19 12 12 19" />
                      </svg>
                    </button>
                  </div>

                  {/* Error indicator */}
                  {error ? (
                    <div className="status-indicator">
                      <span className="status-error">{error}</span>
                    </div>
                  ) : null}
                </div>
              </main>

              {/* Pricing section (only when billing is required) */}
              <PricingSection />

              {/* Footer with attribution */}
              <div className="footer-strip">
                <div className="footer-item">
                  Made with ❤️ using <a href="https://github.com/popmechanic/VibesOS">VibesOS</a>
                </div>
                <div className="footer-item"><span ref={copyrightRef} /></div>
              </div>
            </div>
          </>
        );
      }

      // === Main Router ===
      function AppRouter() {
        if (routeInfo.route === 'admin') {
          return <AdminApp />;
        }
        if (routeInfo.route === 'tenant') {
          return <TenantApp subdomain={routeInfo.subdomain} />;
        }
        return <LandingPage />;
      }

      // === TinyBase Data Shell (init store, persist, sync) ===
      function DataShell({ children }) {
        const [isReady, setIsReady] = useState(false);
        const [isSyncing, setIsSyncing] = useState(false);

        useEffect(() => {
          let destroySync = null;
          let persister = null;

          async function init() {
            persister = createLocalPersister(store, `tinybase_${CONFIG.appName}`);
            await persister.startAutoPersisting([{}, {}]);
            setIsReady(true);

            if (CONFIG.wsUrl && !CONFIG.wsUrl.startsWith('__')) {
              startSync();
            }
          }

          function startSync() {
            if (destroySync) return;
            let syncUrl = CONFIG.wsUrl;
            const token = sessionStorage.getItem('vibes_oidc_access_token');
            if (!token) return;
            syncUrl += (syncUrl.includes('?') ? '&' : '?') + 'token=' + encodeURIComponent(token);
            destroySync = createReconnectingSynchronizer(store, syncUrl, (syncing) => {
              setIsSyncing(syncing);
              window.__VIBES_SYNC_STATUS__ = syncing ? 'synced' : 'reconnecting';
              window.dispatchEvent(new Event('vibes-sync-status-change'));
            });
          }

          function onOidcReady() { startSync(); }
          window.addEventListener('vibes-oidc-ready', onOidcReady);
          init();
          return () => {
            window.removeEventListener('vibes-oidc-ready', onOidcReady);
            if (destroySync) destroySync();
            if (persister) persister.destroy();
          };
        }, []);

        if (!isReady) {
          return <div style={{ padding: '2rem', textAlign: 'center', opacity: 0.5, fontFamily: 'system-ui' }}>Loading...</div>;
        }

        return (
          <Provider store={store}>
            <AppContext.Provider value={{ isReady, isSyncing, user: null }}>
              {children}
            </AppContext.Provider>
          </Provider>
        );
      }

      // === App Wrapper with OIDC ===
      function AppWrapper() {
        // Check for OIDC configuration
        const authority = OIDC_AUTHORITY || vibesConfig.oidcAuthority;
        const clientId = OIDC_CLIENT_ID || vibesConfig.oidcClientId;
        if (!authority || authority.startsWith('__') || !clientId || clientId.startsWith('__')) {
          return <ConfigError message="Missing OIDC configuration. Apps require authentication." />;
        }

        if (!window.OIDCProvider) {
          return <LoadingError error={window.__OIDC_LOAD_ERROR__ || 'OIDC components not available'} />;
        }

        const { OIDCProvider } = window.OIDCComponents;

        return (
          <>
            <SyncStatusDot />
            <OIDCProvider
              authority={authority}
              clientId={clientId}
              config={{
                apiUrl: vibesConfig.tokenApiUri,
                cloudUrl: vibesConfig.cloudBackendUrl
              }}
            >
              <DataShell>
                <AppRouter />
              </DataShell>
            </OIDCProvider>
          </>
        );
      }

      // === Initialize App ===
      async function initApp() {
        try {
          // Dynamic import of OIDC bridge (served at root by Deploy API)
          const oidcModule = await import("/oidc-bridge.js");

          window.OIDCProvider = oidcModule.OIDCProvider;
          window.OIDCComponents = {
            OIDCProvider: oidcModule.OIDCProvider,
            SignedIn: oidcModule.SignedIn,
            SignedOut: oidcModule.SignedOut,
            SignInButton: oidcModule.SignInButton,
            UserButton: oidcModule.UserButton
          };
          // Export for user's App code
          window.SignedIn = oidcModule.SignedIn;
          window.SignedOut = oidcModule.SignedOut;
          window.SignInButton = oidcModule.SignInButton;
          window.UserButton = oidcModule.UserButton;
          window.useUser = oidcModule.useUser;
          // Export OIDC context for SharingBridge and user code
          window.useOIDCContext = oidcModule.useOIDCContext;
        } catch (err) {
          console.error('Failed to load OIDC components:', err);
          window.__OIDC_LOAD_ERROR__ = err.message || String(err);
        }

        const rootElement = document.getElementById("container");
        ReactDOMClient.createRoot(rootElement).render(<AppWrapper />);
      }

      initApp();
    </script>
