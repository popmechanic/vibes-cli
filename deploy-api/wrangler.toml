name = "vibes-deploy-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
account_id = "e33948793047032de7f5e18ec342a7d1"

[vars]
OIDC_ISSUER = "https://vibesos.com"

# Secrets (set via `wrangler secret put`):
# CF_API_TOKEN - scoped to Workers deploys on our account
# CF_ACCOUNT_ID - our Cloudflare account ID
# CF_ZONE_ID - vibesos.com zone ID for custom domain routing
# POCKET_ID_API_KEY - Pocket ID admin API key for per-app registration
# R2_ACCESS_KEY_ID - R2 S3-compatible API token (shared across all apps)
# R2_SECRET_ACCESS_KEY - R2 S3-compatible secret key
# SERVICE_API_KEY - shared key for machine-to-machine auth with Connect dashboard (for public link join flow)

# Service Binding to Pocket ID Worker (avoids .workers.dev routing issue)
[[services]]
binding = "POCKET_ID"
service = "pocket-id"

[[kv_namespaces]]
binding = "REGISTRY_KV"
id = "215847e525304ab29b9127c70672fc86"
