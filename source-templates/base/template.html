        var buf = window.__VIBES_CONSOLE_LOG__ = [];
        var _log = console.log, _warn = console.warn, _err = console.error;
        function capture(level, origFn, args) {

          buf.push({ level: level, message: [].slice.call(args).map(String).join(' '), timestamp: Date.now() });
          origFn.apply(console, args);

        console.error = function() { capture('error', _err, arguments); };
      })();

            React.createElement('p', { className: 'text-sm text-gray-500 mb-4' }, 'Check your network connection and try refreshing the page.'),

      // === SyncStatusDot ===
      // Renders a fixed-position sync status indicator in the top-right corner.
      // Reads status from window.__VIBES_SYNC_STATUS__ via a custom event bridge.
      // Activates automatically when the app connects to the sync server.

        connecting: '#eab308',
        synced: '#22c55e',
        reconnecting: '#eab308',
        error: '#ef4444'
      };
      var SYNC_STATUS_LABELS = {

        connecting: 'connecting',
        synced: 'synced',
        reconnecting: 'reconnecting',
        error: 'offline'

        var isIdle = status === 'idle';
        var isSynced = status === 'synced';

        var containerStyle = {
          position: 'fixed',
          top: '12px',
          right: '12px',
          zIndex: 50,
          pointerEvents: 'none',
          display: 'flex',
          alignItems: 'center',
          gap: '8px',
          background: 'color-mix(in srgb, var(--comp-bg, rgb(245, 245, 244)) 60%, transparent)',
          backdropFilter: 'blur(8px)',
          WebkitBackdropFilter: 'blur(8px)',
          padding: '6px 12px',
          borderRadius: '100px',
          border: '1px solid color-mix(in srgb, var(--comp-border, black) 3%, transparent)',

      // === SharingBridge ===
      // Listens for VibesPanel DOM events and calls Deploy API endpoints.
      // Event listeners are ALWAYS registered — state is resolved at event time,
      // not render time, to avoid timing issues with React context and OIDC.
      function SharingBridge() {
        var joinLinkRef = React.useRef(null);

        // Helper: read current auth + config at call time (not render time).
        // Does NOT call React hooks — safe to use in event handlers.

            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(data) {

                  encodeURIComponent(ctx.appName) + '/' + token;

                'Authorization': 'Bearer ' + ctx.accessToken,

                detail: {
                  email: email,
                  message: 'Invitation sent to ' + email + '!',
                  link: data.inviteUrl || ''

              }));
            })
            .catch(function(err) {
              document.dispatchEvent(new CustomEvent('vibes-share-error', {
                detail: { error: { message: err.message || 'Failed to send invitation.' } }
              }));
            });
          }

          function handlePublicLinkRequest() {
            // Return cached link immediately if available
            if (joinLinkRef.current) {
              document.dispatchEvent(new CustomEvent('vibes-public-link-success', {
                detail: { link: joinLinkRef.current }
              }));
              return;
            }
            // Live fetch — the mount-time fetch may have missed the token
            var ctx = getContext();
            if (!ctx) {
              document.dispatchEvent(new CustomEvent('vibes-public-link-error', {
                detail: { error: { message: 'Not signed in. Please sign in and try again.' } }
              }));
              return;
            }
            fetch(ctx.deployApiUrl + '/status/' + encodeURIComponent(ctx.appName), {
                headers: { 'Authorization': 'Bearer ' + ctx.accessToken }
              })
              .then(function(r) { return r.ok ? r.json() : null; })
              .then(function(data) {
                var token = data && data.publicInvite && data.publicInvite.token;
                if (typeof token === 'string' && token.length > 0) {
                  joinLinkRef.current = ctx.deployApiUrl + '/join/' +
                    encodeURIComponent(ctx.appName) + '/' + token;
                  document.dispatchEvent(new CustomEvent('vibes-public-link-success', {
                    detail: { link: joinLinkRef.current }
                  }));
                } else {
                  document.dispatchEvent(new CustomEvent('vibes-public-link-error', {
                    detail: { error: { message: 'No invite link available. Redeploy the app to generate one.' } }
                  }));
                }
              })
              .catch(function() {
                document.dispatchEvent(new CustomEvent('vibes-public-link-error', {
                  detail: { error: { message: 'Could not fetch invite link. Check your connection.' } }
                }));
              });

          document.addEventListener('vibes-public-link-request', handlePublicLinkRequest);

      }

      // === Markdown Renderer ===

        },
        archive: {
          '--comp-bg': 'oklch(0.95 0.03 80)',
          '--comp-text': 'oklch(0.20 0.02 50)',
          '--comp-border': 'oklch(0.35 0.04 60)',
          '--comp-accent': 'oklch(0.55 0.12 50)',
          '--comp-accent-text': 'oklch(0.97 0.01 90)',
          '--comp-muted': 'oklch(0.50 0.03 60)',
          '--color-background': 'oklch(0.92 0.03 80)',
          '--grid-color': 'oklch(0.35 0.04 60 / 0.06)',
        },
        industrial: {
          '--comp-bg': 'oklch(0.88 0.01 90)',
          '--comp-text': 'oklch(0.05 0.01 0)',
          '--comp-border': 'oklch(0.05 0.01 0)',
          '--comp-accent': 'oklch(0.90 0.20 110)',
          '--comp-accent-text': 'oklch(0.05 0.01 0)',
          '--comp-muted': 'oklch(0.40 0.01 0)',
          '--color-background': 'oklch(0.85 0.01 90)',
          '--grid-color': 'oklch(0.05 0.01 0 / 0.05)',
        }
      };

      function applyVibesTheme(themeId) {
        var preset = VIBES_THEME_PRESETS[themeId];
        if (!preset) return;
        // Instant visual preview while Claude regenerates the actual app code.
        // Uses a <style> tag (not inline styles) so the app's own :root can
        // override in the cascade once the regenerated code loads.
        var styleEl = document.getElementById('vibes-theme-override');
        if (!styleEl) {
          styleEl = document.createElement('style');
          styleEl.id = 'vibes-theme-override';
          document.head.appendChild(styleEl);
        }
        var css = ':root {';
        Object.keys(preset).forEach(function(key) {
          css += key + ':' + preset[key] + ';';
        });
        css += '}';
        styleEl.textContent = css;
        // No localStorage save — theme switching regenerates the app code,
        // so the app's own CSS is always the source of truth.
      }

      // No localStorage theme restore — all apps share the same origin in the
      // desktop app (localhost:3333), so a saved theme from one app would bleed
      // into the next. The app's own CSS is the source of truth.

      // Listen for theme change events from VibesPanel
      document.addEventListener('vibes-design-request', function(e) {
        var themeId = e.detail && e.detail.theme;
        if (themeId) applyVibesTheme(themeId);
      });

      // Also expose for apps that want to set themes programmatically
      window.__VIBES_THEME_PRESETS__ = VIBES_THEME_PRESETS;
      window.applyVibesTheme = applyVibesTheme;
    </script>
    <script type="module" src="/vibes-ai.js"></script>
